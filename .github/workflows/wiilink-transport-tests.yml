name: Player list diagnostics tests

on:
  push:
    paths:
      - 'program/**'
      - '.github/workflows/wiilink-transport-tests.yml'
  pull_request:
    paths:
      - 'program/**'
      - '.github/workflows/wiilink-transport-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proxy-http:
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test direct, environment, and Windows proxy fallback
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          .\program\tests\Test-ProxyHttp.ps1

  payload-logging:
    needs: proxy-http
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test payload chunking, truncation, and source integration
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          .\program\tests\Test-PayloadLogging.ps1

  logging-core:
    needs: payload-logging
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test empty Queue logging and source emitters
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          .\program\tests\Test-LoggingCore.ps1

  test-wiilink-transports:
    needs: logging-core
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show browser availability
        shell: powershell
        run: |
          $edge = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\App Paths\msedge.exe' -ErrorAction SilentlyContinue).'(default)'
          $chrome = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\App Paths\chrome.exe' -ErrorAction SilentlyContinue).'(default)'
          Write-Host "Edge=$edge"
          Write-Host "Chrome=$chrome"

      - name: Test syntax, log UI, direct API, and Chrome or Edge transport
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          .\program\tests\Test-WiiLinkTransports.ps1
