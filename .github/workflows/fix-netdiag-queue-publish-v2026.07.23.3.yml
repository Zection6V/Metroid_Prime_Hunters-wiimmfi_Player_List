name: Fix NETDIAG queue and publish v2026.07.23.3

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-netdiag-queue-publish-v2026.07.23.3.yml'

permissions:
  contents: write

concurrency:
  group: publish-v2026.07.23.3
  cancel-in-progress: false

jobs:
  fix-test-publish:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      RELEASE_TAG: v2026.07.23.3
      RELEASE_TITLE: v2026.07.23.3 — NETDIAG Queue Propagation Fix
      ASSET_NAME: Metroid_Prime_Hunters-wiimmfi_Player_List.zip

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Patch explicit diagnostic Queue propagation
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          @'
          from pathlib import Path

          root = Path.cwd()

          fallback = root / 'program/lib/WiiLinkFallback.ps1'
          fallback_text = r'''<#
              WiiLinkFallback.ps1 - policy and diagnostics for Direct API failures.

              The viewer keeps Direct API as the first choice. When every HTTP route is
              exhausted, a one-time background diagnostic is started and the viewer
              changes to Chrome/Edge.
          #>

          $networkDiagnosticsPath = Join-Path $PSScriptRoot 'NetworkDiagnostics.ps1'
          if (Test-Path -LiteralPath $networkDiagnosticsPath -PathType Leaf) {
              . $networkDiagnosticsPath
          }

          function Write-WiiLinkFallbackDiagnosticFailure {
              param(
                  [AllowNull()]$LogQueue,
                  [Parameter(Mandatory = $true)][string]$Message
              )

              if ($null -eq $LogQueue) { return }
              try {
                  $LogQueue.Enqueue(@{
                          time = [datetime]::Now
                          source = 'WiiLink'
                          level = 'ERROR'
                          stage = 'NETDIAG'
                          message = $Message
                      })
              } catch {}
          }

          function Test-WiiLinkBrowserFallbackRequired {
              param(
                  [ValidateSet('direct', 'browser')][string]$SelectedTransport,
                  [AllowNull()]$Data,
                  [AllowNull()]$LogQueue = $null
              )

              if ($SelectedTransport -ne 'direct' -or $null -eq $Data) { return $false }

              $okProperty = $Data.PSObject.Properties['ok']
              if ($null -ne $okProperty -and [bool]$okProperty.Value) { return $false }

              $errorProperty = $Data.PSObject.Properties['error']
              $errorText = if ($null -ne $errorProperty) { [string]$errorProperty.Value } else { '' }
              if ([string]::IsNullOrWhiteSpace($errorText)) { return $false }

              # Only route exhaustion starts diagnostics and changes the transport.
              # The caller passes its synchronized Queue explicitly; no scope discovery is used.
              $fallbackRequired = $errorText.StartsWith('All HTTP routes failed:', [System.StringComparison]::OrdinalIgnoreCase)
              if ($fallbackRequired -and $null -ne $LogQueue) {
                  try {
                      $diagnosticCommand = Get-Command Start-MphNetworkDiagnostics -ErrorAction SilentlyContinue
                      if ($null -eq $diagnosticCommand) {
                          Write-WiiLinkFallbackDiagnosticFailure -LogQueue $LogQueue -Message 'Background diagnostics unavailable; Start-MphNetworkDiagnostics was not loaded.'
                      } else {
                          [void](Start-MphNetworkDiagnostics -Url ([uri]'https://api.wfc.wiilink24.com/api/stats') -LogQueue $LogQueue -Source 'WiiLink' -TriggerError $errorText)
                      }
                  } catch {
                      Write-WiiLinkFallbackDiagnosticFailure -LogQueue $LogQueue -Message ('Unable to schedule background diagnostics; type={0}; error={1}' -f $_.Exception.GetType().FullName, $_.Exception.Message)
                  }
              }
              return $fallbackRequired
          }

          function Get-WiiLinkTransportComboIndex {
              param([AllowNull()][string]$Transport)
              if ([string]$Transport -eq 'browser') { return 1 }
              return 0
          }
          '''
          fallback.write_text(fallback_text.replace('\n          ', '\n').lstrip(), encoding='utf-8-sig')

          replacements = {
              root / 'program/WiiLink-PlayerList.ps1': (
                  'Test-WiiLinkBrowserFallbackRequired -SelectedTransport $transport -Data $data',
                  'Test-WiiLinkBrowserFallbackRequired -SelectedTransport $transport -Data $data -LogQueue $sync.LogQueue'
              ),
              root / 'program/MPH-Unified.ps1': (
                  'Test-WiiLinkBrowserFallbackRequired -SelectedTransport $transport -Data $data',
                  'Test-WiiLinkBrowserFallbackRequired -SelectedTransport $transport -Data $data -LogQueue $sync.WiiLinkLogQueue'
              )
          }
          for path, (old, new) in replacements.items():
              text = path.read_text(encoding='utf-8-sig')
              if text.count(old) != 1:
                  raise RuntimeError(f'{path}: expected exactly one fallback call, found {text.count(old)}')
              path.write_text(text.replace(old, new), encoding='utf-8-sig')

          diagnostics = root / 'program/lib/NetworkDiagnostics.ps1'
          text = diagnostics.read_text(encoding='utf-8-sig')
          old_script = """$scriptText = @'
          param($diagnosticScript, $urlText, $queue, $sourceName, $trigger)
          . $diagnosticScript
          Invoke-MphNetworkDiagnostics -Url ([uri]$urlText) -LogQueue $queue -Source $sourceName -TriggerError $trigger | Out-Null
          '@""".replace('\n          ', '\n')
          new_script = """$scriptText = @'
          param($diagnosticScript, $urlText, $queue, $sourceName, $trigger)
          try {
              . $diagnosticScript
              Invoke-MphNetworkDiagnostics -Url ([uri]$urlText) -LogQueue $queue -Source $sourceName -TriggerError $trigger | Out-Null
          } catch {
              try {
                  $queue.Enqueue(@{
                          time = [datetime]::Now
                          source = $sourceName
                          level = 'ERROR'
                          stage = 'NETDIAG'
                          message = ('Background diagnostics failed; type={0}; error={1}' -f $_.Exception.GetType().FullName, $_.Exception.Message)
                      })
              } catch {}
          }
          '@""".replace('\n          ', '\n')
          if text.count(old_script) != 1:
              raise RuntimeError(f'NetworkDiagnostics nested script block not found exactly once: {text.count(old_script)}')
          text = text.replace(old_script, new_script)

          old_gate = """    if ($script:MphNetworkDiagnosticStarted.ContainsKey($key)) {
                  Write-MphNetworkDiagnostic -LogQueue $LogQueue -Source $Source -Level DEBUG -Message ('Diagnostics already scheduled for {0}' -f $key)
                  return $false
              }
              $script:MphNetworkDiagnosticStarted[$key] = [datetime]::UtcNow
          """.replace('\n          ', '\n')
          new_gate = """    if ($script:MphNetworkDiagnosticStarted.ContainsKey($key)) {
                  $lastStarted = [datetime]$script:MphNetworkDiagnosticStarted[$key]
                  $elapsedSeconds = ([datetime]::UtcNow - $lastStarted).TotalSeconds
                  if ($elapsedSeconds -lt 60) {
                      Write-MphNetworkDiagnostic -LogQueue $LogQueue -Source $Source -Level DEBUG -Message ('Diagnostics cooldown active for {0}; elapsedSec={1:N1}' -f $key, $elapsedSeconds)
                      return $false
                  }
                  [void]$script:MphNetworkDiagnosticStarted.Remove($key)
              }
              $script:MphNetworkDiagnosticStarted[$key] = [datetime]::UtcNow
          """.replace('\n          ', '\n')
          if text.count(old_gate) != 1:
              raise RuntimeError(f'NetworkDiagnostics scheduling gate not found exactly once: {text.count(old_gate)}')
          diagnostics.write_text(text.replace(old_gate, new_gate), encoding='utf-8-sig')

          test = root / 'program/tests/Test-WiiLinkFallbackQueue.ps1'
          test.write_text(r'''$ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          $programDir = Split-Path -Parent (Split-Path -Parent $MyInvocation.MyCommand.Path)
          . (Join-Path $programDir 'lib\WiiLinkFallback.ps1')

          function Assert-True {
              param([bool]$Condition, [string]$Message)
              if (-not $Condition) { throw "ASSERT FAILED: $Message" }
          }

          $script:ObservedQueue = $null
          $script:ObservedTrigger = ''
          function Start-MphNetworkDiagnostics {
              param(
                  [uri]$Url,
                  [AllowNull()]$LogQueue,
                  [string]$Source,
                  [string]$TriggerError
              )
              $script:ObservedQueue = $LogQueue
              $script:ObservedTrigger = $TriggerError
              $LogQueue.Enqueue(@{ time = [datetime]::Now; source = $Source; level = 'INFO'; stage = 'NETDIAG'; message = 'stub scheduled' })
              return $true
          }

          $queue = [System.Collections.Queue]::Synchronized((New-Object System.Collections.Queue))
          $failure = [pscustomobject]@{
              ok = $false
              state = 'error'
              error = 'All HTTP routes failed: direct: timeout | system: timeout'
          }

          Assert-True (Test-WiiLinkBrowserFallbackRequired -SelectedTransport direct -Data $failure -LogQueue $queue) 'Route exhaustion must trigger fallback.'
          Assert-True ([object]::ReferenceEquals($queue, $script:ObservedQueue)) 'The synchronized Queue must be passed explicitly to network diagnostics.'
          Assert-True ($script:ObservedTrigger -eq $failure.error) 'The original route failure must be passed to diagnostics.'
          Assert-True ($queue.Count -eq 1) 'The diagnostic scheduler must be able to write to the supplied Queue.'

          $standalone = Get-Content -LiteralPath (Join-Path $programDir 'WiiLink-PlayerList.ps1') -Raw
          $unified = Get-Content -LiteralPath (Join-Path $programDir 'MPH-Unified.ps1') -Raw
          Assert-True ($standalone -match 'Test-WiiLinkBrowserFallbackRequired[^\r\n]+-LogQueue\s+\$sync\.LogQueue') 'Standalone viewer must pass its WiiLink Queue explicitly.'
          Assert-True ($unified -match 'Test-WiiLinkBrowserFallbackRequired[^\r\n]+-LogQueue\s+\$sync\.WiiLinkLogQueue') 'Unified viewer must pass its WiiLink Queue explicitly.'

          $fallbackSource = Get-Content -LiteralPath (Join-Path $programDir 'lib\WiiLinkFallback.ps1') -Raw
          Assert-True ($fallbackSource -notmatch 'Get-WiiLinkFallbackLogQueue') 'Fallback policy must not discover Queue objects through dynamic scope scanning.'
          Assert-True ($fallbackSource -match '\[AllowNull\(\)\]\$LogQueue') 'Fallback policy must expose an explicit LogQueue parameter.'

          Write-Host 'RESULT: SUCCESS'
          '''.replace('\n          ', '\n').lstrip(), encoding='utf-8-sig')
          '@ | python -

          git rm -- '.github/workflows/fix-netdiag-queue-publish-v2026.07.23.3.yml'

      - name: Validate PowerShell syntax
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $failures = @()
          Get-ChildItem -LiteralPath .\program -Recurse -Filter '*.ps1' | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors)
            foreach ($error in @($errors)) {
              $failures += ('{0}:{1}: {2}' -f $_.FullName, $error.Extent.StartLineNumber, $error.Message)
            }
          }
          if ($failures.Count -gt 0) { throw ($failures -join [Environment]::NewLine) }

      - name: Run deterministic tests
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($test in @(
            '.\program\tests\Test-ProxyHttp.ps1',
            '.\program\tests\Test-WiiLinkBrowserFallback.ps1',
            '.\program\tests\Test-WiiLinkFallbackQueue.ps1',
            '.\program\tests\Test-WiiLinkGroupParsing.ps1',
            '.\program\tests\Test-WiiLinkStatsOnlyDisplay.ps1',
            '.\program\tests\Test-PayloadLogging.ps1',
            '.\program\tests\Test-LoggingCore.ps1'
          )) {
            Write-Host "=== $test ==="
            & $test
          }

      - name: Commit and push fix
        id: source
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- program/WiiLink-PlayerList.ps1 program/MPH-Unified.ps1 program/lib/WiiLinkFallback.ps1 program/lib/NetworkDiagnostics.ps1 program/tests/Test-WiiLinkFallbackQueue.ps1
          git add -u -- '.github/workflows/fix-netdiag-queue-publish-v2026.07.23.3.yml'
          git commit -m 'Fix WiiLink NETDIAG queue propagation'
          git push origin HEAD:master
          $sha = (git rev-parse HEAD).Trim()
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package and verify program contents
        id: package
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $assetPath = Join-Path $env:GITHUB_WORKSPACE $env:ASSET_NAME
          $verifyRoot = Join-Path $env:RUNNER_TEMP 'mph-v2026-07-23-3-verify'
          Remove-Item -LiteralPath $assetPath -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $verifyRoot -Recurse -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path (Join-Path $env:GITHUB_WORKSPACE 'program\*') -DestinationPath $assetPath -CompressionLevel Optimal -Force
          Expand-Archive -LiteralPath $assetPath -DestinationPath $verifyRoot -Force
          if (Test-Path -LiteralPath (Join-Path $verifyRoot 'program') -PathType Container) { throw 'program directory must not exist at ZIP root.' }
          foreach ($required in @(
            'MPH-Unified.ps1',
            'WiiLink-PlayerList.ps1',
            'lib\WiiLinkFallback.ps1',
            'lib\NetworkDiagnostics.ps1',
            'tests\Test-WiiLinkFallbackQueue.ps1'
          )) {
            if (-not (Test-Path -LiteralPath (Join-Path $verifyRoot $required) -PathType Leaf)) { throw "ZIP missing $required" }
          }
          $fallback = Get-Content -LiteralPath (Join-Path $verifyRoot 'lib\WiiLinkFallback.ps1') -Raw
          if ($fallback -match 'Get-WiiLinkFallbackLogQueue' -or $fallback -notmatch '\$LogQueue') { throw 'ZIP contains the obsolete fallback Queue discovery implementation.' }
          $zip = Get-Item -LiteralPath $assetPath
          $hash = (Get-FileHash -LiteralPath $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "path=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "size=$($zip.Length)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create new immutable Release and Asset
        id: release
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.source.outputs.sha }}
          ASSET_PATH: ${{ steps.package.outputs.path }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const targetSha = process.env.TARGET_SHA;
            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              throw new Error(`Release ${tag} already exists and will not be overwritten.`);
            } catch (error) { if (error.status !== 404) throw error; }
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              throw new Error(`Tag ${tag} already exists and will not be moved.`);
            } catch (error) { if (error.status !== 404) throw error; }

            const data = fs.readFileSync(process.env.ASSET_PATH);
            if (data.length !== Number(process.env.ASSET_SIZE)) throw new Error('ZIP size mismatch before upload.');
            let release;
            try {
              const body = [
                '## 日本語',
                '',
                '- Direct API失敗後のNETDIAGにログQueueが渡らず、診断が無言で開始されない問題を修正',
                '- スタンドアロン版と統合版の両方から同期Queueを明示的に渡すよう変更',
                '- バックグラウンド診断内部の例外をNETDIAGエラーとして表示',
                '- 診断スケジュールを永久ロックではなく60秒クールダウン方式へ変更',
                '- Chrome/Edgeへの自動フォールバックは維持',
                '',
                'このReleaseとAssetは上書きしません。',
                '',
                '## English',
                '',
                '- Fixed missing NETDIAG output caused by implicit dynamic-scope Queue discovery.',
                '- Both viewers now pass their synchronized WiiLink logging Queue explicitly.',
                '- Background diagnostic exceptions are reported through NETDIAG.',
                '- Diagnostic scheduling now uses a 60-second cooldown instead of a permanent process lock.',
                '',
                `Target commit: ${targetSha}`,
                `Asset SHA-256: ${process.env.ASSET_SHA256}`
              ].join('\n');
              release = (await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                target_commitish: targetSha,
                name: process.env.RELEASE_TITLE,
                body,
                draft: false,
                prerelease: false,
                make_latest: 'true'
              })).data;
              const uploaded = (await github.rest.repos.uploadReleaseAsset({
                owner, repo,
                release_id: release.id,
                name: process.env.ASSET_NAME,
                data,
                headers: { 'content-type': 'application/zip', 'content-length': data.length }
              })).data;
              if (uploaded.name !== process.env.ASSET_NAME || uploaded.size !== data.length) throw new Error('Uploaded Asset verification failed.');
              core.setOutput('release_id', String(release.id));
              core.setOutput('release_url', release.html_url);
              core.setOutput('asset_id', String(uploaded.id));
              core.setOutput('asset_url', uploaded.browser_download_url);
            } catch (error) {
              if (release) {
                try { await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id }); } catch (_) {}
                try { await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` }); } catch (_) {}
              }
              throw error;
            }

      - name: Record immutable Release result
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.source.outputs.sha }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          ASSET_ID: ${{ steps.release.outputs.asset_id }}
          ASSET_URL: ${{ steps.release.outputs.asset_url }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = `.github/release-status/${process.env.RELEASE_TAG}.json`;
            const status = {
              published: true,
              immutable: true,
              tag: process.env.RELEASE_TAG,
              name: process.env.RELEASE_TITLE,
              targetCommit: process.env.TARGET_SHA,
              tests: {
                powershellSyntax: 'success',
                proxy: 'success',
                browserFallback: 'success',
                explicitQueuePropagation: 'success',
                groupsParsing: 'success',
                statsOnlyDisplay: 'success',
                payloadLogging: 'success',
                loggingCore: 'success'
              },
              release: { id: Number(process.env.RELEASE_ID), url: process.env.RELEASE_URL },
              asset: {
                uploaded: true,
                id: Number(process.env.ASSET_ID),
                name: process.env.ASSET_NAME,
                size: Number(process.env.ASSET_SIZE),
                sha256: process.env.ASSET_SHA256,
                layout: 'program-contents-at-zip-root',
                downloadUrl: process.env.ASSET_URL
              },
              verifiedAt: new Date().toISOString()
            };
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Record immutable ${process.env.RELEASE_TAG} result`,
              content: Buffer.from(JSON.stringify(status, null, 2) + '\n').toString('base64'),
              branch: 'master'
            });
