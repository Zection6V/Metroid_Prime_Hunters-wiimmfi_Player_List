name: Trigger v2026.07.23.4 after French quote fix
# Trigger revision 2

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/trigger-publish-v2026.07.23.4.yml'

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
      - name: Update publisher trigger revision
        run: |
          printf '\n# Trigger revision 3: French WiiLink note quoting fixed.\n' >> .github/workflows/publish-v2026.07.23.4.yml
          git rm .github/workflows/trigger-publish-v2026.07.23.4.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/publish-v2026.07.23.4.yml
          git commit -m 'Retry v2026.07.23.4 after French quote fix'
          git push origin HEAD:master
