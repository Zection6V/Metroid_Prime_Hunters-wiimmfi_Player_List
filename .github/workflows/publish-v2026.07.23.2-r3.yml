name: Diagnose and publish v2026.07.23.2

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/publish-v2026.07.23.2-r3.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-v2026.07.23.2
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      RELEASE_TAG: v2026.07.23.2
      RELEASE_TITLE: v2026.07.23.2 — Direct API Network Diagnostics
      ASSET_NAME: Metroid_Prime_Hunters-wiimmfi_Player_List.zip

    steps:
      - name: Checkout immutable source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Validate PowerShell syntax
        id: syntax
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $failures = @()
          Get-ChildItem -LiteralPath .\program -Recurse -Filter '*.ps1' | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors)
            foreach ($error in @($errors)) {
              $failures += ('{0}:{1}: {2}' -f $_.FullName, $error.Extent.StartLineNumber, $error.Message)
            }
          }
          if ($failures.Count -gt 0) { throw ($failures -join [Environment]::NewLine) }

      - name: Capture deterministic test results
        id: tests
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          $ErrorActionPreference = 'Stop'
          $logDir = Join-Path $env:GITHUB_WORKSPACE 'release-test-logs'
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null
          $tests = [ordered]@{
            proxy = '.\program\tests\Test-ProxyHttp.ps1'
            browserFallback = '.\program\tests\Test-WiiLinkBrowserFallback.ps1'
            groupsParsing = '.\program\tests\Test-WiiLinkGroupParsing.ps1'
            statsOnlyDisplay = '.\program\tests\Test-WiiLinkStatsOnlyDisplay.ps1'
            networkDiagnostics = '.\program\tests\Test-NetworkDiagnostics.ps1'
            payloadLogging = '.\program\tests\Test-PayloadLogging.ps1'
            loggingCore = '.\program\tests\Test-LoggingCore.ps1'
          }
          $allSuccess = $true
          foreach ($entry in $tests.GetEnumerator()) {
            $name = [string]$entry.Key
            $path = [string]$entry.Value
            $logPath = Join-Path $logDir ($name + '.log')
            $lines = New-Object System.Collections.Generic.List[string]
            $result = 'failure'
            try {
              & $path *>&1 | ForEach-Object {
                $text = [string]$_
                $lines.Add($text)
                Write-Host "[$name] $text"
              }
              $result = 'success'
            } catch {
              $lines.Add(('Message: {0}' -f $_.Exception.Message))
              $lines.Add(('Type: {0}' -f $_.Exception.GetType().FullName))
              $lines.Add(('Position: {0}' -f $_.InvocationInfo.PositionMessage))
              $lines.Add(('ScriptStackTrace: {0}' -f $_.ScriptStackTrace))
              $lines.Add(('FullError: {0}' -f ($_ | Format-List * -Force | Out-String)))
              $allSuccess = $false
            }
            [System.IO.File]::WriteAllLines($logPath, $lines, [System.Text.UTF8Encoding]::new($false))
            ("{0}={1}" -f $name, $result) | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          ("all_success={0}" -f $allSuccess.ToString().ToLowerInvariant()) | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package and verify current program contents
        id: package
        if: steps.syntax.outcome == 'success' && steps.tests.outputs.all_success == 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $assetPath = Join-Path $env:GITHUB_WORKSPACE $env:ASSET_NAME
          $programRoot = Join-Path $env:GITHUB_WORKSPACE 'program'
          $verifyRoot = Join-Path $env:RUNNER_TEMP 'mph-v2026-07-23-2-r3-verify'
          Remove-Item -LiteralPath $assetPath -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $verifyRoot -Recurse -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path (Join-Path $programRoot '*') -DestinationPath $assetPath -CompressionLevel Optimal -Force
          Expand-Archive -LiteralPath $assetPath -DestinationPath $verifyRoot -Force
          if (Test-Path -LiteralPath (Join-Path $verifyRoot 'program') -PathType Container) { throw 'ZIP contains an unwanted program wrapper directory.' }
          foreach ($required in @(
            'MPH-Unified.ps1',
            'Wiimmfi-PlayerList.ps1',
            'WiiLink-PlayerList.ps1',
            'Run MPH Unified.bat',
            'lib\ProxyHttp.ps1',
            'lib\WiiLinkFallback.ps1',
            'lib\NetworkDiagnostics.ps1',
            'tests\Test-NetworkDiagnostics.ps1'
          )) {
            if (-not (Test-Path -LiteralPath (Join-Path $verifyRoot $required) -PathType Leaf)) { throw "ZIP is missing $required" }
          }
          $zip = Get-Item -LiteralPath $assetPath
          $hash = (Get-FileHash -LiteralPath $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "path=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "size=$($zip.Length)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create immutable Release
        id: release
        if: steps.package.outcome == 'success'
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ github.sha }}
          ASSET_PATH: ${{ steps.package.outputs.path }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const targetSha = process.env.TARGET_SHA;
            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              throw new Error(`Release ${tag} already exists and will not be overwritten.`);
            } catch (error) { if (error.status !== 404) throw error; }
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              throw new Error(`Tag ${tag} already exists and will not be moved.`);
            } catch (error) { if (error.status !== 404) throw error; }
            const data = fs.readFileSync(process.env.ASSET_PATH);
            if (data.length !== Number(process.env.ASSET_SIZE)) throw new Error('ZIP size mismatch.');
            const body = [
              '## 日本語', '',
              '- Direct API失敗時の`NETDIAG`詳細診断を追加',
              '- DNS、IPv4/IPv6 TCP 443、TLS、証明書、WinINet、WinHTTP、システムプロキシを記録',
              '- 全HTTP経路失敗時にChrome/Edgeへ自動フォールバック',
              '- `mprimeds.online > 0`かつ`groups = 0`のstats-only表示を修正',
              '- ZIP直下には`program`配下の内容のみを格納', '',
              'このReleaseとAssetは公開後に上書きしません。', '',
              '## English', '',
              '- Added detailed `NETDIAG` output for Direct API failures.',
              '- Records DNS, IPv4/IPv6 TCP 443, TLS, certificates, WinINet, WinHTTP, and system proxy details.',
              '- Automatically falls back to Chrome/Edge after all HTTP routes fail.',
              '- Fixed stats-only WiiLink display.',
              '- ZIP root contains the contents of `program`.', '',
              `Target commit: ${targetSha}`,
              `Asset SHA-256: ${process.env.ASSET_SHA256}`
            ].join('\n');
            let release;
            try {
              release = (await github.rest.repos.createRelease({ owner, repo, tag_name: tag, target_commitish: targetSha, name: process.env.RELEASE_TITLE, body, draft: false, prerelease: false, make_latest: 'true' })).data;
              const asset = (await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name: process.env.ASSET_NAME, data, headers: { 'content-type': 'application/zip', 'content-length': data.length } })).data;
              if (asset.name !== process.env.ASSET_NAME || asset.size !== data.length) throw new Error('Uploaded Asset verification failed.');
              core.setOutput('release_id', String(release.id));
              core.setOutput('release_url', release.html_url);
              core.setOutput('asset_id', String(asset.id));
              core.setOutput('asset_url', asset.browser_download_url);
            } catch (error) {
              if (release) {
                try { await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id }); } catch (_) {}
                try { await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` }); } catch (_) {}
              }
              throw error;
            }

      - name: Record detailed run result
        if: always()
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ github.sha }}
          SYNTAX_OUTCOME: ${{ steps.syntax.outcome }}
          PROXY_RESULT: ${{ steps.tests.outputs.proxy }}
          BROWSER_RESULT: ${{ steps.tests.outputs.browserFallback }}
          GROUPS_RESULT: ${{ steps.tests.outputs.groupsParsing }}
          STATS_RESULT: ${{ steps.tests.outputs.statsOnlyDisplay }}
          NETDIAG_RESULT: ${{ steps.tests.outputs.networkDiagnostics }}
          PAYLOAD_RESULT: ${{ steps.tests.outputs.payloadLogging }}
          LOGGING_RESULT: ${{ steps.tests.outputs.loggingCore }}
          PACKAGE_OUTCOME: ${{ steps.package.outcome }}
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          ASSET_ID: ${{ steps.release.outputs.asset_id }}
          ASSET_URL: ${{ steps.release.outputs.asset_url }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = `.github/release-status/${process.env.RELEASE_TAG}.json`;
            let existingSha;
            try {
              const existing = (await github.rest.repos.getContent({ owner, repo, path, ref: 'master' })).data;
              existingSha = existing.sha;
            } catch (error) { if (error.status !== 404) throw error; }
            const names = ['proxy','browserFallback','groupsParsing','statsOnlyDisplay','networkDiagnostics','payloadLogging','loggingCore'];
            const values = [process.env.PROXY_RESULT,process.env.BROWSER_RESULT,process.env.GROUPS_RESULT,process.env.STATS_RESULT,process.env.NETDIAG_RESULT,process.env.PAYLOAD_RESULT,process.env.LOGGING_RESULT];
            const testResults = Object.fromEntries(names.map((name, index) => [name, values[index] || 'unknown']));
            const failureLogs = {};
            for (const name of names) {
              if (testResults[name] === 'success') continue;
              const logPath = `${process.env.GITHUB_WORKSPACE}\\release-test-logs\\${name}.log`;
              let text = fs.existsSync(logPath) ? fs.readFileSync(logPath, 'utf8') : 'No log was produced.';
              if (text.length > 12000) text = text.slice(-12000);
              failureLogs[name] = text;
            }
            const published = process.env.RELEASE_OUTCOME === 'success';
            const status = {
              published,
              immutable: true,
              tag: process.env.RELEASE_TAG,
              name: process.env.RELEASE_TITLE,
              targetCommit: process.env.TARGET_SHA,
              syntax: process.env.SYNTAX_OUTCOME,
              tests: testResults,
              failureLogs,
              packageOutcome: process.env.PACKAGE_OUTCOME,
              releaseOutcome: process.env.RELEASE_OUTCOME,
              release: published ? { id: Number(process.env.RELEASE_ID), url: process.env.RELEASE_URL } : null,
              asset: published ? { uploaded: true, id: Number(process.env.ASSET_ID), name: process.env.ASSET_NAME, size: Number(process.env.ASSET_SIZE), sha256: process.env.ASSET_SHA256, layout: 'program-contents-at-zip-root', downloadUrl: process.env.ASSET_URL } : null,
              verifiedAt: new Date().toISOString()
            };
            await github.rest.repos.createOrUpdateFileContents({ owner, repo, path, message: `Record detailed ${process.env.RELEASE_TAG} attempt`, content: Buffer.from(JSON.stringify(status, null, 2) + '\n').toString('base64'), sha: existingSha, branch: 'master' });
