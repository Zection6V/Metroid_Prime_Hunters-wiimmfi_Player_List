name: Player list diagnostics tests

on:
  push:
    paths:
      - 'program/**'
      - '.github/workflows/wiilink-transport-tests.yml'
  pull_request:
    paths:
      - 'program/**'
      - '.github/workflows/wiilink-transport-tests.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  proxy-http:
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test direct, environment, and Windows proxy fallback
        shell: powershell
        env:
          MPH_LANG: en
        run: .\program\tests\Test-ProxyHttp.ps1

  wiilink-browser-fallback:
    needs: proxy-http
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test automatic switch and reliable NETDIAG Queue capture
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          .\program\tests\Test-WiiLinkBrowserFallback.ps1
          .\program\tests\Test-WiiLinkFallbackCapturedQueue.ps1

  wiilink-group-parsing:
    needs: wiilink-browser-fallback
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test groups response shapes and game-filtered endpoints
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          .\program\tests\Test-WiiLinkGroupParsing.ps1
          .\program\tests\Test-WiiLinkGameFilter.ps1

  wiilink-stats-only-display:
    needs: wiilink-group-parsing
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test stats-only online display without groups
        shell: powershell
        env:
          MPH_LANG: ja
        run: .\program\tests\Test-WiiLinkStatsOnlyDisplay.ps1

  payload-logging:
    needs: wiilink-stats-only-display
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test payload chunking, truncation, and source integration
        shell: powershell
        env:
          MPH_LANG: en
        run: .\program\tests\Test-PayloadLogging.ps1

  logging-core:
    needs: payload-logging
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test log storage and incremental rendering
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          .\program\tests\Test-LoggingCore.ps1
          .\program\tests\Test-DiagnosticLogIncremental.ps1

  test-wiilink-transports:
    needs: logging-core
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Show browser availability
        shell: powershell
        run: |
          $edge = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\App Paths\msedge.exe' -ErrorAction SilentlyContinue).'(default)'
          $chrome = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\App Paths\chrome.exe' -ErrorAction SilentlyContinue).'(default)'
          Write-Host "Edge=$edge"
          Write-Host "Chrome=$chrome"
      - name: Test syntax, log UI, direct API, and Chrome or Edge transport
        shell: powershell
        env:
          MPH_LANG: en
        run: .\program\tests\Test-WiiLinkTransports.ps1

  publish-v2026-07-23-5-immediate:
    if: github.event_name == 'push'
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      RELEASE_TAG: v2026.07.23.5
      RELEASE_TITLE: v2026.07.23.5 — Unambiguous WiiLink Room Visibility Note
      ASSET_NAME: Metroid_Prime_Hunters-wiimmfi_Player_List.zip
    steps:
      - name: Checkout fixed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Validate wording and package ZIP
        id: package
        shell: powershell
        env:
          MPH_LANG: ja
        run: |
          $ErrorActionPreference = 'Stop'
          $tokens = $null
          $parseErrors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path '.\program\lib\I18n.ps1'), [ref]$tokens, [ref]$parseErrors)
          if (@($parseErrors).Count -gt 0) { throw ((@($parseErrors) | ForEach-Object Message) -join [Environment]::NewLine) }
          .\program\tests\Test-WiiLinkStatsOnlyDisplay.ps1

          $assetPath = Join-Path $env:GITHUB_WORKSPACE $env:ASSET_NAME
          $verifyRoot = Join-Path $env:RUNNER_TEMP 'mph-v2026-07-23-5-immediate-verify'
          Remove-Item -LiteralPath $assetPath -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $verifyRoot -Recurse -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path (Join-Path $env:GITHUB_WORKSPACE 'program\*') -DestinationPath $assetPath -CompressionLevel Optimal -Force
          Expand-Archive -LiteralPath $assetPath -DestinationPath $verifyRoot -Force
          if (Test-Path -LiteralPath (Join-Path $verifyRoot 'program') -PathType Container) { throw 'program directory must not exist at ZIP root.' }
          $i18nSource = Get-Content -LiteralPath (Join-Path $verifyRoot 'lib\I18n.ps1') -Raw
          if ($i18nSource -notmatch [regex]::Escape('その部屋の中にプレイヤーが2人以上')) { throw 'Precise Japanese wording is missing.' }
          if ($i18nSource -match [regex]::Escape('部屋一覧は2人以上')) { throw 'Ambiguous Japanese wording remains.' }
          $zip = Get-Item -LiteralPath $assetPath
          $sha256 = (Get-FileHash -LiteralPath $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "path=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "size=$($zip.Length)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha256=$sha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create new immutable Release and Asset
        id: release
        uses: actions/github-script@v7
        env:
          ASSET_PATH: ${{ steps.package.outputs.path }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
          TARGET_SHA: ${{ github.sha }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              throw new Error(`Release ${tag} already exists and will not be overwritten.`);
            } catch (error) { if (error.status !== 404) throw error; }
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              throw new Error(`Tag ${tag} already exists and will not be moved.`);
            } catch (error) { if (error.status !== 404) throw error; }
            const data = fs.readFileSync(process.env.ASSET_PATH);
            let release;
            try {
              release = (await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                target_commitish: process.env.TARGET_SHA,
                name: process.env.RELEASE_TITLE,
                body: [
                  '## 日本語', '',
                  '- 注記を「各部屋は、その部屋の中にプレイヤーが2人以上いる場合のみ表示されます」に変更',
                  '- 「部屋が2件以上必要」と解釈できる曖昧な表現を廃止',
                  '- 全対応言語と回帰テストにも同じ意味を反映', '',
                  'このReleaseとAssetは上書きしません。', '',
                  '## English', '',
                  '- Clarifies that each room is listed only when at least two players are inside that room.', '',
                  `Target commit: ${process.env.TARGET_SHA}`,
                  `Asset SHA-256: ${process.env.ASSET_SHA256}`
                ].join('\n'),
                draft: false,
                prerelease: false,
                make_latest: 'true'
              })).data;
              const uploaded = (await github.rest.repos.uploadReleaseAsset({
                owner, repo,
                release_id: release.id,
                name: process.env.ASSET_NAME,
                data,
                headers: { 'content-type': 'application/zip', 'content-length': data.length }
              })).data;
              if (uploaded.size !== data.length) throw new Error('Uploaded Asset size mismatch.');
              core.setOutput('release_id', String(release.id));
              core.setOutput('release_url', release.html_url);
              core.setOutput('asset_id', String(uploaded.id));
              core.setOutput('asset_url', uploaded.browser_download_url);
            } catch (error) {
              if (release) {
                try { await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id }); } catch (_) {}
                try { await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` }); } catch (_) {}
              }
              throw error;
            }

      - name: Record successful publication
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ github.sha }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          ASSET_ID: ${{ steps.release.outputs.asset_id }}
          ASSET_URL: ${{ steps.release.outputs.asset_url }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = `.github/release-status/${process.env.RELEASE_TAG}.json`;
            const status = {
              published: true,
              immutable: true,
              tag: process.env.RELEASE_TAG,
              name: process.env.RELEASE_TITLE,
              targetCommit: process.env.TARGET_SHA,
              outcomes: { validation: 'success', package: 'success', release: 'success' },
              features: { roomVisibilityWording: 'each-room-contains-at-least-two-players' },
              release: { id: Number(process.env.RELEASE_ID), url: process.env.RELEASE_URL },
              asset: {
                uploaded: true,
                id: Number(process.env.ASSET_ID),
                name: process.env.ASSET_NAME,
                size: Number(process.env.ASSET_SIZE),
                sha256: process.env.ASSET_SHA256,
                layout: 'program-contents-at-zip-root',
                downloadUrl: process.env.ASSET_URL
              },
              verifiedAt: new Date().toISOString()
            };
            let sha;
            try { sha = (await github.rest.repos.getContent({ owner, repo, path, ref: 'master' })).data.sha; } catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Record immutable ${process.env.RELEASE_TAG} result`,
              content: Buffer.from(JSON.stringify(status, null, 2) + '\n').toString('base64'),
              branch: 'master',
              ...(sha ? { sha } : {})
            });
