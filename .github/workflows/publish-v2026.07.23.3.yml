name: Publish v2026.07.23.3
# Every stage records its outcome so publication failures can be diagnosed from the repository.

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/publish-v2026.07.23.3.yml'

permissions:
  contents: write

concurrency:
  group: publish-v2026.07.23.3
  cancel-in-progress: false

jobs:
  validate-and-publish:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      RELEASE_TAG: v2026.07.23.3
      RELEASE_TITLE: v2026.07.23.3 — Reliable Direct API NETDIAG
      TARGET_SHA: fed38f1caa41fa7e0b78602d947f5fe43247313c
      ASSET_NAME: Metroid_Prime_Hunters-wiimmfi_Player_List.zip

    steps:
      - name: Checkout immutable source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Validate syntax and deterministic tests
        id: validate
        continue-on-error: true
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          $ErrorActionPreference = 'Stop'
          $logPath = Join-Path $env:GITHUB_WORKSPACE 'v2026.07.23.3-validation.log'
          $result = 'success'
          try {
              $failures = @()
              Get-ChildItem -LiteralPath .\program -Recurse -Filter '*.ps1' | ForEach-Object {
                  $tokens = $null
                  $errors = $null
                  [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors)
                  foreach ($error in @($errors)) {
                      $failures += ('{0}:{1}: {2}' -f $_.FullName, $error.Extent.StartLineNumber, $error.Message)
                  }
              }
              if ($failures.Count -gt 0) { throw ($failures -join [Environment]::NewLine) }
              'PowerShell syntax: success' | Tee-Object -FilePath $logPath -Append

              foreach ($test in @(
                  '.\program\tests\Test-ProxyHttp.ps1',
                  '.\program\tests\Test-WiiLinkBrowserFallback.ps1',
                  '.\program\tests\Test-WiiLinkFallbackCapturedQueue.ps1',
                  '.\program\tests\Test-WiiLinkGroupParsing.ps1',
                  '.\program\tests\Test-WiiLinkStatsOnlyDisplay.ps1',
                  '.\program\tests\Test-PayloadLogging.ps1',
                  '.\program\tests\Test-LoggingCore.ps1'
              )) {
                  "=== $test ===" | Tee-Object -FilePath $logPath -Append
                  & $test *>&1 | Tee-Object -FilePath $logPath -Append
              }
          } catch {
              $result = 'failure'
              ('Message: {0}' -f $_.Exception.Message) | Tee-Object -FilePath $logPath -Append
              ('Type: {0}' -f $_.Exception.GetType().FullName) | Tee-Object -FilePath $logPath -Append
              ('Position: {0}' -f $_.InvocationInfo.PositionMessage) | Tee-Object -FilePath $logPath -Append
              ('ScriptStackTrace: {0}' -f $_.ScriptStackTrace) | Tee-Object -FilePath $logPath -Append
              ($_ | Format-List * -Force | Out-String) | Tee-Object -FilePath $logPath -Append
          }
          "result=$result" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Validation result: $result"
          exit 0

      - name: Package and verify program contents
        id: package
        if: steps.validate.outputs.result == 'success'
        continue-on-error: true
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $result = 'success'
          $logPath = Join-Path $env:GITHUB_WORKSPACE 'v2026.07.23.3-package.log'
          try {
              $assetPath = Join-Path $env:GITHUB_WORKSPACE $env:ASSET_NAME
              $verifyRoot = Join-Path $env:RUNNER_TEMP 'mph-v2026-07-23-3-verify'
              Remove-Item -LiteralPath $assetPath -Force -ErrorAction SilentlyContinue
              Remove-Item -LiteralPath $verifyRoot -Recurse -Force -ErrorAction SilentlyContinue
              Compress-Archive -Path (Join-Path $env:GITHUB_WORKSPACE 'program\*') -DestinationPath $assetPath -CompressionLevel Optimal -Force
              Expand-Archive -LiteralPath $assetPath -DestinationPath $verifyRoot -Force

              if (Test-Path -LiteralPath (Join-Path $verifyRoot 'program') -PathType Container) {
                  throw 'program directory must not exist at ZIP root.'
              }
              foreach ($required in @(
                  'MPH-Unified.ps1',
                  'Wiimmfi-PlayerList.ps1',
                  'WiiLink-PlayerList.ps1',
                  'Run MPH Unified.bat',
                  'lib\WiiLinkFallback.ps1',
                  'lib\NetworkDiagnostics.ps1',
                  'tests\Test-WiiLinkFallbackCapturedQueue.ps1'
              )) {
                  if (-not (Test-Path -LiteralPath (Join-Path $verifyRoot $required) -PathType Leaf)) {
                      throw "ZIP missing $required"
                  }
              }
              $fallback = Get-Content -LiteralPath (Join-Path $verifyRoot 'lib\WiiLinkFallback.ps1') -Raw
              if ($fallback -match 'Get-WiiLinkFallbackLogQueue') { throw 'ZIP contains obsolete dynamic Queue discovery.' }
              if ($fallback -notmatch 'Invoke-MphNetworkDiagnostics') { throw 'ZIP does not run detailed diagnostics directly.' }
              if ($fallback -notmatch 'Running detailed Direct API diagnostics') { throw 'ZIP lacks visible NETDIAG start logging.' }

              $zip = Get-Item -LiteralPath $assetPath
              $sha256 = (Get-FileHash -LiteralPath $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
              "path=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              "size=$($zip.Length)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              "sha256=$sha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              "Verified ZIP size=$($zip.Length) sha256=$sha256" | Tee-Object -FilePath $logPath -Append
          } catch {
              $result = 'failure'
              ($_ | Format-List * -Force | Out-String) | Tee-Object -FilePath $logPath -Append
          }
          "result=$result" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          exit 0

      - name: Create new immutable Release and Asset
        id: release
        if: steps.validate.outputs.result == 'success' && steps.package.outputs.result == 'success'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ASSET_PATH: ${{ steps.package.outputs.path }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              throw new Error(`Release ${tag} already exists and will not be overwritten.`);
            } catch (error) { if (error.status !== 404) throw error; }
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              throw new Error(`Tag ${tag} already exists and will not be moved.`);
            } catch (error) { if (error.status !== 404) throw error; }

            const data = fs.readFileSync(process.env.ASSET_PATH);
            if (data.length !== Number(process.env.ASSET_SIZE)) throw new Error('ZIP size mismatch before upload.');
            let release;
            try {
              const body = [
                '## 日本語', '',
                '- NETDIAGのログQueueを動的スコープ探索する方式を廃止',
                '- WiiLinkワーカー読み込み時に同期Queueを確実に捕捉',
                '- Direct API全経路失敗時に詳細診断を同一ワーカー内で実行',
                '- DNSのIPv4/IPv6アドレス、TCP 443、TLS、WinINet、WinHTTP、システムプロキシ結果をログ出力',
                '- 診断失敗もNETDIAGエラーとして表示',
                '- Chrome/Edgeへの自動フォールバックは維持', '',
                'このReleaseとAssetは上書きしません。', '',
                '## English', '',
                '- Removed dynamic-scope discovery of the NETDIAG logging Queue.',
                '- Captures the synchronized Queue when the WiiLink worker loads the fallback module.',
                '- Runs detailed diagnostics in the same worker after all Direct API routes fail.',
                '- Reliably logs DNS IPv4/IPv6 addresses, TCP 443, TLS, WinINet, WinHTTP, and system proxy results.',
                '- Diagnostic failures are surfaced as NETDIAG errors.', '',
                `Target commit: ${process.env.TARGET_SHA}`,
                `Asset SHA-256: ${process.env.ASSET_SHA256}`
              ].join('\n');
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, target_commitish: process.env.TARGET_SHA,
                name: process.env.RELEASE_TITLE, body, draft: false, prerelease: false, make_latest: 'true'
              })).data;
              const uploaded = (await github.rest.repos.uploadReleaseAsset({
                owner, repo, release_id: release.id, name: process.env.ASSET_NAME, data,
                headers: { 'content-type': 'application/zip', 'content-length': data.length }
              })).data;
              if (uploaded.name !== process.env.ASSET_NAME || uploaded.size !== data.length) {
                throw new Error('Uploaded Asset verification failed.');
              }
              core.setOutput('release_id', String(release.id));
              core.setOutput('release_url', release.html_url);
              core.setOutput('asset_id', String(uploaded.id));
              core.setOutput('asset_url', uploaded.browser_download_url);
            } catch (error) {
              if (release) {
                try { await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id }); } catch (_) {}
                try { await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` }); } catch (_) {}
              }
              throw error;
            }

      - name: Record publication outcome
        if: always()
        uses: actions/github-script@v7
        env:
          VALIDATION_RESULT: ${{ steps.validate.outputs.result }}
          PACKAGE_RESULT: ${{ steps.package.outputs.result }}
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          ASSET_ID: ${{ steps.release.outputs.asset_id }}
          ASSET_URL: ${{ steps.release.outputs.asset_url }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = `.github/release-status/${process.env.RELEASE_TAG}.json`;
            const readTail = (name) => {
              const p = `${process.env.GITHUB_WORKSPACE}\\${name}`;
              if (!fs.existsSync(p)) return null;
              const data = fs.readFileSync(p);
              let text;
              if (data.length >= 2 && data[0] === 0xff && data[1] === 0xfe) text = data.subarray(2).toString('utf16le');
              else text = data.toString('utf8');
              if (text.length > 30000) text = text.slice(-30000);
              return text;
            };
            const published = process.env.RELEASE_OUTCOME === 'success' && Boolean(process.env.RELEASE_ID);
            const status = {
              published,
              immutable: true,
              tag: process.env.RELEASE_TAG,
              name: process.env.RELEASE_TITLE,
              targetCommit: process.env.TARGET_SHA,
              outcomes: {
                validation: process.env.VALIDATION_RESULT || 'not-run',
                package: process.env.PACKAGE_RESULT || 'not-run',
                release: process.env.RELEASE_OUTCOME || 'not-run'
              },
              failureLogs: {
                validation: process.env.VALIDATION_RESULT === 'success' ? null : readTail('v2026.07.23.3-validation.log'),
                package: process.env.PACKAGE_RESULT === 'success' ? null : readTail('v2026.07.23.3-package.log')
              },
              release: published ? { id: Number(process.env.RELEASE_ID), url: process.env.RELEASE_URL } : null,
              asset: published ? {
                uploaded: true,
                id: Number(process.env.ASSET_ID),
                name: process.env.ASSET_NAME,
                size: Number(process.env.ASSET_SIZE),
                sha256: process.env.ASSET_SHA256,
                layout: 'program-contents-at-zip-root',
                downloadUrl: process.env.ASSET_URL
              } : null,
              verifiedAt: new Date().toISOString()
            };
            let sha;
            try {
              const current = (await github.rest.repos.getContent({ owner, repo, path, ref: 'master' })).data;
              sha = current.sha;
            } catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Record ${process.env.RELEASE_TAG} publication outcome`,
              content: Buffer.from(JSON.stringify(status, null, 2) + '\n').toString('base64'),
              sha, branch: 'master'
            });