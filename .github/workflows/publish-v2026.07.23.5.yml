name: Publish v2026.07.23.5

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/publish-v2026.07.23.5.yml'

permissions:
  contents: write

concurrency:
  group: publish-v2026.07.23.5
  cancel-in-progress: false

jobs:
  validate-package-publish:
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      RELEASE_TAG: v2026.07.23.5
      RELEASE_TITLE: v2026.07.23.5 — Unambiguous WiiLink Room Visibility Note
      ASSET_NAME: Metroid_Prime_Hunters-wiimmfi_Player_List.zip

    steps:
      - name: Checkout workflow HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Validate syntax and deterministic tests
        id: validate
        continue-on-error: true
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          $ErrorActionPreference = 'Stop'
          $logPath = Join-Path $env:RUNNER_TEMP 'validation.log'
          try {
            $parseFailures = @()
            Get-ChildItem -LiteralPath .\program -Recurse -Filter '*.ps1' | ForEach-Object {
              $tokens = $null
              $parseErrors = $null
              [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors)
              foreach ($parseError in @($parseErrors)) {
                $parseFailures += ('{0}:{1}: {2}' -f $_.FullName, $parseError.Extent.StartLineNumber, $parseError.Message)
              }
            }
            if ($parseFailures.Count -gt 0) { throw ($parseFailures -join [Environment]::NewLine) }
            'PowerShell syntax: success' | Tee-Object -FilePath $logPath

            foreach ($test in @(
              '.\program\tests\Test-ProxyHttp.ps1',
              '.\program\tests\Test-WiiLinkBrowserFallback.ps1',
              '.\program\tests\Test-WiiLinkFallbackCapturedQueue.ps1',
              '.\program\tests\Test-WiiLinkGroupParsing.ps1',
              '.\program\tests\Test-WiiLinkGameFilter.ps1',
              '.\program\tests\Test-WiiLinkStatsOnlyDisplay.ps1',
              '.\program\tests\Test-PayloadLogging.ps1',
              '.\program\tests\Test-LoggingCore.ps1',
              '.\program\tests\Test-DiagnosticLogIncremental.ps1'
            )) {
              "=== $test ===" | Tee-Object -FilePath $logPath -Append
              & $test *>&1 | Tee-Object -FilePath $logPath -Append
            }
            "outcome=success" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } catch {
            $failure = ($_ | Format-List * -Force | Out-String)
            $failure | Tee-Object -FilePath $logPath -Append | Write-Host
            $combined = if (Test-Path $logPath) { Get-Content $logPath -Raw } else { $failure }
            if ($combined.Length -gt 60000) { $combined = $combined.Substring($combined.Length - 60000) }
            $encoded = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($combined))
            "failure_b64=$encoded" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "outcome=failure" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            throw
          }

      - name: Package and verify program contents
        id: package
        if: steps.validate.outputs.outcome == 'success'
        continue-on-error: true
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          try {
            $assetPath = Join-Path $env:GITHUB_WORKSPACE $env:ASSET_NAME
            $verifyRoot = Join-Path $env:RUNNER_TEMP 'mph-v2026-07-23-5-verify'
            Remove-Item -LiteralPath $assetPath -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $verifyRoot -Recurse -Force -ErrorAction SilentlyContinue
            Compress-Archive -Path (Join-Path $env:GITHUB_WORKSPACE 'program\*') -DestinationPath $assetPath -CompressionLevel Optimal -Force
            Expand-Archive -LiteralPath $assetPath -DestinationPath $verifyRoot -Force

            if (Test-Path -LiteralPath (Join-Path $verifyRoot 'program') -PathType Container) {
              throw 'program directory must not exist at ZIP root.'
            }
            foreach ($required in @(
              'MPH-Unified.ps1',
              'Wiimmfi-PlayerList.ps1',
              'WiiLink-PlayerList.ps1',
              'Run MPH Unified.bat',
              'lib\I18n.ps1',
              'lib\TreeRender.ps1',
              'tests\Test-WiiLinkStatsOnlyDisplay.ps1'
            )) {
              if (-not (Test-Path -LiteralPath (Join-Path $verifyRoot $required) -PathType Leaf)) {
                throw "ZIP missing $required"
              }
            }

            $i18nSource = Get-Content -LiteralPath (Join-Path $verifyRoot 'lib\I18n.ps1') -Raw
            if ($i18nSource -notmatch [regex]::Escape('その部屋の中にプレイヤーが2人以上')) {
              throw 'ZIP lacks the unambiguous Japanese room visibility wording.'
            }
            if ($i18nSource -match [regex]::Escape('部屋一覧は2人以上')) {
              throw 'ZIP still contains the ambiguous Japanese room-list wording.'
            }

            $zip = Get-Item -LiteralPath $assetPath
            $sha256 = (Get-FileHash -LiteralPath $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
            "path=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "size=$($zip.Length)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "sha256=$sha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "outcome=success" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } catch {
            $encoded = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes(($_ | Format-List * -Force | Out-String)))
            "failure_b64=$encoded" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "outcome=failure" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            throw
          }

      - name: Create new immutable Release and Asset
        id: release
        if: steps.package.outputs.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ASSET_PATH: ${{ steps.package.outputs.path }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
          TARGET_SHA: ${{ github.sha }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              throw new Error(`Release ${tag} already exists and will not be overwritten.`);
            } catch (error) { if (error.status !== 404) throw error; }
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              throw new Error(`Tag ${tag} already exists and will not be moved.`);
            } catch (error) { if (error.status !== 404) throw error; }

            const data = fs.readFileSync(process.env.ASSET_PATH);
            if (data.length !== Number(process.env.ASSET_SIZE)) throw new Error('ZIP size mismatch before upload.');
            let release;
            try {
              const body = [
                '## 日本語',
                '',
                '- WiiLinkの注記を「各部屋は、その部屋の中にプレイヤーが2人以上いる場合のみ表示されます」に変更',
                '- 「部屋が2件以上必要」と誤解される可能性のある表現を廃止',
                '- 全対応言語でも、各部屋の内部に2人以上必要であることを明示',
                '- 表示文言を回帰テストとZIP展開検証で固定',
                '',
                'このReleaseとAssetは上書きしません。',
                '',
                '## English',
                '',
                '- Clarifies that each WiiLink room is listed only when at least two players are inside that room.',
                '- Locks the wording with deterministic tests and ZIP verification.',
                '',
                `Target commit: ${process.env.TARGET_SHA}`,
                `Asset SHA-256: ${process.env.ASSET_SHA256}`
              ].join('\n');
              release = (await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                target_commitish: process.env.TARGET_SHA,
                name: process.env.RELEASE_TITLE,
                body,
                draft: false,
                prerelease: false,
                make_latest: 'true'
              })).data;
              const uploaded = (await github.rest.repos.uploadReleaseAsset({
                owner, repo,
                release_id: release.id,
                name: process.env.ASSET_NAME,
                data,
                headers: { 'content-type': 'application/zip', 'content-length': data.length }
              })).data;
              if (uploaded.name !== process.env.ASSET_NAME || uploaded.size !== data.length) {
                throw new Error('Uploaded Asset verification failed.');
              }
              core.setOutput('outcome', 'success');
              core.setOutput('release_id', String(release.id));
              core.setOutput('release_url', release.html_url);
              core.setOutput('asset_id', String(uploaded.id));
              core.setOutput('asset_url', uploaded.browser_download_url);
            } catch (error) {
              core.setOutput('outcome', 'failure');
              core.setOutput('error_b64', Buffer.from(String(error.stack || error.message || error)).toString('base64'));
              if (release) {
                try { await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id }); } catch (_) {}
                try { await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` }); } catch (_) {}
              }
              throw error;
            }

      - name: Record Release result
        if: always()
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ github.sha }}
          VALIDATION_OUTCOME: ${{ steps.validate.outputs.outcome }}
          VALIDATION_FAILURE_B64: ${{ steps.validate.outputs.failure_b64 }}
          PACKAGE_OUTCOME: ${{ steps.package.outputs.outcome }}
          PACKAGE_FAILURE_B64: ${{ steps.package.outputs.failure_b64 }}
          RELEASE_OUTCOME: ${{ steps.release.outputs.outcome }}
          RELEASE_ERROR_B64: ${{ steps.release.outputs.error_b64 }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          ASSET_ID: ${{ steps.release.outputs.asset_id }}
          ASSET_URL: ${{ steps.release.outputs.asset_url }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = `.github/release-status/${process.env.RELEASE_TAG}.json`;
            const success = process.env.RELEASE_OUTCOME === 'success';
            const status = {
              published: success,
              immutable: true,
              tag: process.env.RELEASE_TAG,
              name: process.env.RELEASE_TITLE,
              targetCommit: process.env.TARGET_SHA,
              outcomes: {
                validation: process.env.VALIDATION_OUTCOME || 'not-run',
                package: process.env.PACKAGE_OUTCOME || 'not-run',
                release: process.env.RELEASE_OUTCOME || 'not-run'
              },
              features: {
                roomVisibilityWording: 'each-room-contains-at-least-two-players'
              },
              failureLogsBase64: {
                validation: process.env.VALIDATION_FAILURE_B64 || null,
                package: process.env.PACKAGE_FAILURE_B64 || null,
                release: process.env.RELEASE_ERROR_B64 || null
              },
              release: success ? { id: Number(process.env.RELEASE_ID), url: process.env.RELEASE_URL } : null,
              asset: success ? {
                uploaded: true,
                id: Number(process.env.ASSET_ID),
                name: process.env.ASSET_NAME,
                size: Number(process.env.ASSET_SIZE),
                sha256: process.env.ASSET_SHA256,
                layout: 'program-contents-at-zip-root',
                downloadUrl: process.env.ASSET_URL
              } : null,
              verifiedAt: new Date().toISOString()
            };
            let sha;
            try { sha = (await github.rest.repos.getContent({ owner, repo, path, ref: 'master' })).data.sha; } catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Record immutable ${process.env.RELEASE_TAG} result`,
              content: Buffer.from(JSON.stringify(status, null, 2) + '\n').toString('base64'),
              branch: 'master',
              ...(sha ? { sha } : {})
            });

      - name: Fail workflow if publication did not complete
        if: always()
        shell: powershell
        run: |
          if ('${{ steps.validate.outputs.outcome }}' -ne 'success') { throw 'Validation failed.' }
          if ('${{ steps.package.outputs.outcome }}' -ne 'success') { throw 'Packaging failed.' }
          if ('${{ steps.release.outputs.outcome }}' -ne 'success') { throw 'Release publication failed.' }
