name: Set WiiLink browser transport default

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/set-wiilink-browser-default.yml'

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set Chrome or Edge as the startup transport
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          @'
          from pathlib import Path

          root = Path.cwd()

          replacements = [
              (
                  root / 'program/WiiLink-PlayerList.ps1',
                  "Transport = 'direct'; BrowserPid = 0; LogQueue = $logStore.Queue",
                  "Transport = 'browser'; BrowserPid = 0; LogQueue = $logStore.Queue",
              ),
              (
                  root / 'program/MPH-Unified.ps1',
                  "WiiLinkTransport = 'direct'; WiiLinkPid = 0",
                  "WiiLinkTransport = 'browser'; WiiLinkPid = 0",
              ),
              (
                  root / 'program/lib/ViewerCommon.ps1',
                  '$combo.SelectedIndex = 0',
                  '$combo.SelectedIndex = 1',
              ),
          ]

          for path, old, new in replacements:
              text = path.read_text(encoding='utf-8-sig')
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{path}: expected one occurrence of {old!r}, found {count}')
              path.write_text(text.replace(old, new), encoding='utf-8-sig')

          test_path = root / 'program/tests/Test-WiiLinkBrowserFallback.ps1'
          test = test_path.read_text(encoding='utf-8-sig')
          anchor = "Assert-True ((Get-WiiLinkTransportComboIndex -Transport browser) -eq 1) 'Chrome/Edge must map to selector index 1.'"
          addition = r'''

          Write-Host '== Chrome or Edge startup default =='
          $viewerCommon = Get-Content -LiteralPath (Join-Path $programDir 'lib\ViewerCommon.ps1') -Raw
          $standaloneDefault = Get-Content -LiteralPath (Join-Path $programDir 'WiiLink-PlayerList.ps1') -Raw
          $unifiedDefault = Get-Content -LiteralPath (Join-Path $programDir 'MPH-Unified.ps1') -Raw
          Assert-True ($viewerCommon -match '\$combo\.SelectedIndex\s*=\s*1') 'The transport selector must initially show Chrome/Edge.'
          Assert-True ($standaloneDefault -match "Transport\s*=\s*'browser';\s*BrowserPid") 'Standalone WiiLink must start with Chrome/Edge.'
          Assert-True ($unifiedDefault -match "WiiLinkTransport\s*=\s*'browser';\s*WiiLinkPid") 'Unified WiiLink must start with Chrome/Edge.'
          '''.replace('\n          ', '\n').rstrip()
          if test.count(anchor) != 1:
              raise RuntimeError(f'Browser fallback test anchor count was {test.count(anchor)}')
          if "Write-Host '== Chrome or Edge startup default =='" in test:
              raise RuntimeError('Startup-default test already exists.')
          test_path.write_text(test.replace(anchor, anchor + addition), encoding='utf-8-sig')
          '@ | python -

          git rm -- '.github/workflows/set-wiilink-browser-default.yml'

      - name: Validate PowerShell syntax
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $failures = @()
          Get-ChildItem -LiteralPath .\program -Recurse -Filter '*.ps1' | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors)
            foreach ($error in @($errors)) {
              $failures += ('{0}:{1}: {2}' -f $_.FullName, $error.Extent.StartLineNumber, $error.Message)
            }
          }
          if ($failures.Count -gt 0) { throw ($failures -join [Environment]::NewLine) }

      - name: Run deterministic tests
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($test in @(
            '.\program\tests\Test-ProxyHttp.ps1',
            '.\program\tests\Test-WiiLinkBrowserFallback.ps1',
            '.\program\tests\Test-WiiLinkFallbackCapturedQueue.ps1',
            '.\program\tests\Test-WiiLinkGroupParsing.ps1',
            '.\program\tests\Test-WiiLinkStatsOnlyDisplay.ps1',
            '.\program\tests\Test-PayloadLogging.ps1',
            '.\program\tests\Test-LoggingCore.ps1'
          )) {
            Write-Host "=== $test ==="
            & $test
          }

      - name: Commit browser-default change
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- program/WiiLink-PlayerList.ps1 program/MPH-Unified.ps1 program/lib/ViewerCommon.ps1 program/tests/Test-WiiLinkBrowserFallback.ps1
          git add -u -- '.github/workflows/set-wiilink-browser-default.yml'
          git commit -m 'Default WiiLink to Chrome or Edge transport'
          git push origin HEAD:master
