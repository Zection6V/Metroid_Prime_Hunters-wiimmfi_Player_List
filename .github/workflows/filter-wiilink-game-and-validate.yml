name: Filter WiiLink API requests by game

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/filter-wiilink-game-and-validate.yml'

permissions:
  contents: write

jobs:
  patch-and-commit:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Apply patch and record outcome
        id: patch
        shell: powershell
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Stop'
          $statusDir = '.github/patch-status'
          New-Item -ItemType Directory -Path $statusDir -Force | Out-Null
          $logPath = Join-Path $statusDir 'filter-wiilink-game.log'
          try {
            & python .github/scripts/filter_wiilink_game.py *> $logPath
            if ($LASTEXITCODE -ne 0) { throw "Patch script exited with code $LASTEXITCODE" }
            'success' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "outcome=success" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } catch {
            Add-Content -LiteralPath $logPath -Value ("ERROR: " + $_.Exception.Message) -Encoding UTF8
            "outcome=failure" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Commit successful patch
        if: steps.patch.outputs.outcome == 'success'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          Remove-Item -LiteralPath '.github/patch-status' -Recurse -Force -ErrorAction SilentlyContinue
          if (Test-Path -LiteralPath '.github/workflows/add-wiilink-room-note-incremental-log.yml') {
            git rm -- '.github/workflows/add-wiilink-room-note-incremental-log.yml'
          }
          git rm -- '.github/workflows/filter-wiilink-game-and-validate.yml'
          git rm -- '.github/scripts/filter_wiilink_game.py'
          git add -- README.md program/lib/WiiLinkSource.ps1 program/tests/Test-WiiLinkGameFilter.ps1 .github/workflows/wiilink-transport-tests.yml
          git add -u -- .github
          git commit -m 'Filter WiiLink API requests by game'
          git push origin HEAD:master

      - name: Commit failure diagnostics
        if: steps.patch.outputs.outcome != 'success'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- .github/patch-status/filter-wiilink-game.log
          git commit -m 'Record WiiLink game-filter patch failure'
          git push origin HEAD:master
          throw 'WiiLink game-filter patch failed; see .github/patch-status/filter-wiilink-game.log'
