name: Publish v2026.07.23.1
# Validation revision: final-empty-collection-and-context-fixes

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/publish-release-v2026.07.23.1.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-v2026.07.23.1
  cancel-in-progress: false

jobs:
  validate-and-publish:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test proxy routing and fallback
        id: proxy_tests
        shell: powershell
        env:
          MPH_LANG: en
        run: .\program\tests\Invoke-CapturedTest.ps1 -TestPath .\program\tests\Test-ProxyHttp.ps1 -LogPath "$env:GITHUB_WORKSPACE\proxy-test.log"

      - name: Test WiiLink groups normalization
        id: parsing_tests
        shell: powershell
        env:
          MPH_LANG: en
        run: .\program\tests\Invoke-CapturedTest.ps1 -TestPath .\program\tests\Test-WiiLinkGroupParsing.ps1 -LogPath "$env:GITHUB_WORKSPACE\parsing-test.log"

      - name: Test payload logging
        id: payload_tests
        shell: powershell
        env:
          MPH_LANG: en
        run: .\program\tests\Invoke-CapturedTest.ps1 -TestPath .\program\tests\Test-PayloadLogging.ps1 -LogPath "$env:GITHUB_WORKSPACE\payload-test.log"

      - name: Test logging core
        id: logging_tests
        shell: powershell
        env:
          MPH_LANG: en
        run: .\program\tests\Invoke-CapturedTest.ps1 -TestPath .\program\tests\Test-LoggingCore.ps1 -LogPath "$env:GITHUB_WORKSPACE\logging-test.log"

      - name: Test syntax and live WiiLink transports
        id: transport_tests
        shell: powershell
        env:
          MPH_LANG: en
        run: .\program\tests\Invoke-CapturedTest.ps1 -TestPath .\program\tests\Test-WiiLinkTransports.ps1 -LogPath "$env:GITHUB_WORKSPACE\transport-test.log"

      - name: Create tag and GitHub Release
        id: publish
        if: >-
          steps.proxy_tests.outputs.result == 'success' &&
          steps.parsing_tests.outputs.result == 'success' &&
          steps.payload_tests.outputs.result == 'success' &&
          steps.logging_tests.outputs.result == 'success' &&
          steps.transport_tests.outputs.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = 'v2026.07.23.1';
            const name = 'v2026.07.23.1 — WiiLink Proxy Fallback Hotfix';
            const body = [
              '## 日本語',
              '',
              'WiiLink Direct APIがプロキシ、PAC、WPAD環境でタイムアウトする問題を修正しました。',
              '',
              '### 変更点',
              '- Windowsのグローバルプロキシを強制無効化していた処理を削除',
              '- 直結 → HTTPS_PROXY/HTTP_PROXY → Windowsシステムプロキシの自動フォールバックを追加',
              '- NO_PROXY、Windows既定資格情報、明示プロキシ認証に対応',
              '- 詳細ログのPROXYステージへ試行順、タイムアウト、失敗理由、成功経路を出力',
              '- WiiLink groups APIの空オブジェクト、配列、ラッパー、IDマップ形式を正規化',
              '- 部屋0件の正常応答をプロパティ不足エラーにしないよう修正',
              '- Direct APIで解決しない環境ではChrome／Edge経路を引き続き選択可能',
              '- プロキシ経路、JSON形状、payload、ログ、実通信の回帰テストを追加',
              '',
              'Windowsシステムプロキシだけを使用する場合: `set MPH_PROXY=system`',
              '',
              '---',
              '',
              '## English',
              '',
              'Fixes WiiLink Direct API timeouts on networks requiring a proxy, PAC, or WPAD.',
              '',
              '- Removed process-wide proxy disablement',
              '- Added direct → HTTPS_PROXY/HTTP_PROXY → Windows system proxy fallback',
              '- Added NO_PROXY and default Windows proxy credentials',
              '- Added detailed PROXY-stage diagnostics',
              '- Normalized empty, array, wrapped, and ID-mapped groups API responses',
              '- Prevented zero-room responses from failing under PowerShell StrictMode',
              '- Added deterministic proxy, parsing, payload, logging, and live-transport tests',
              '- Chrome / Edge remains available as a selectable fallback transport'
            ].join('\n');

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${tag}`, sha: context.sha });
            }

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.setOutput('release_url', existing.data.html_url);
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const release = await github.rest.repos.createRelease({
              owner, repo, tag_name: tag, target_commitish: context.sha,
              name, body, draft: false, prerelease: false, make_latest: 'true'
            });
            core.setOutput('release_url', release.data.html_url);

      - name: Record validation and release result
        if: always()
        uses: actions/github-script@v7
        env:
          PROXY_RESULT: ${{ steps.proxy_tests.outputs.result }}
          PARSING_RESULT: ${{ steps.parsing_tests.outputs.result }}
          PAYLOAD_RESULT: ${{ steps.payload_tests.outputs.result }}
          LOGGING_RESULT: ${{ steps.logging_tests.outputs.result }}
          TRANSPORT_RESULT: ${{ steps.transport_tests.outputs.result }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = 'v2026.07.23.1';
            const path = '.github/release-status/v2026.07.23.1.json';
            let release = null;
            try {
              release = (await github.rest.repos.getReleaseByTag({ owner, repo, tag })).data;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            function readFailure(result, filename) {
              if (result === 'success') return null;
              const filePath = `${process.env.GITHUB_WORKSPACE}\\${filename}`;
              if (!fs.existsSync(filePath)) return 'Log file was not created.';
              let text = fs.readFileSync(filePath, 'utf8');
              if (text.length > 16000) text = text.slice(-16000);
              return text;
            }

            const results = {
              proxy: process.env.PROXY_RESULT || 'unknown',
              parsing: process.env.PARSING_RESULT || 'unknown',
              payload: process.env.PAYLOAD_RESULT || 'unknown',
              logging: process.env.LOGGING_RESULT || 'unknown',
              transports: process.env.TRANSPORT_RESULT || 'unknown'
            };
            const status = {
              published: Boolean(release) && !release.draft,
              tag,
              name: release ? release.name : 'v2026.07.23.1 — WiiLink Proxy Fallback Hotfix',
              url: release ? release.html_url : null,
              releaseId: release ? release.id : null,
              draft: release ? release.draft : null,
              prerelease: release ? release.prerelease : null,
              targetCommit: context.sha,
              tests: results,
              failureLogs: {
                proxy: readFailure(results.proxy, 'proxy-test.log'),
                parsing: readFailure(results.parsing, 'parsing-test.log'),
                payload: readFailure(results.payload, 'payload-test.log'),
                logging: readFailure(results.logging, 'logging-test.log'),
                transports: readFailure(results.transports, 'transport-test.log')
              },
              publishOutcome: process.env.PUBLISH_OUTCOME,
              verifiedAt: new Date().toISOString()
            };
            const content = Buffer.from(JSON.stringify(status, null, 2) + '\n').toString('base64');
            let sha;
            try {
              sha = (await github.rest.repos.getContent({ owner, repo, path, ref: 'master' })).data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Record ${tag} validation and release result`,
              content, sha, branch: 'master'
            });
