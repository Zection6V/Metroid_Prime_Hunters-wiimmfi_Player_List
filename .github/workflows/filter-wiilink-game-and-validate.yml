name: Filter WiiLink API requests by game

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/filter-wiilink-game-and-validate.yml'

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Add game-filtered WiiLink API requests
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          @'
          from pathlib import Path

          root = Path.cwd()
          source_path = root / 'program/lib/WiiLinkSource.ps1'
          source = source_path.read_text(encoding='utf-8-sig')

          helper_anchor = "function Get-WiiLinkPropertyValue {"
          helper = r'''function Add-WiiLinkGameQuery {
              param(
                  [Parameter(Mandatory = $true)][string]$Url,
                  [Parameter(Mandatory = $true)][string]$Game
              )

              if ([string]::IsNullOrWhiteSpace($Game)) { return $Url }
              $uri = [uri]$Url
              if ([string]$uri.Query -match '(?i)(?:^|[?&])game=') { return $Url }

              $builder = New-Object System.UriBuilder($uri)
              $existing = ([string]$builder.Query).TrimStart('?')
              $pair = 'game=' + [uri]::EscapeDataString($Game)
              $builder.Query = if ([string]::IsNullOrWhiteSpace($existing)) { $pair } else { $existing + '&' + $pair }
              return $builder.Uri.AbsoluteUri
          }

          '''.replace('\n          ', '\n')
          if source.count(helper_anchor) != 1:
              raise RuntimeError(f'Add-WiiLinkGameQuery anchor count: {source.count(helper_anchor)}')
          source = source.replace(helper_anchor, helper + helper_anchor)

          old_add_params = r'''        [Parameter(Mandatory = $true)][AllowEmptyCollection()][System.Collections.ArrayList]$List,
                  [AllowNull()]$Candidate,
                  [string]$FallbackId = ''
              )'''.replace('\n              ', '\n')
          new_add_params = r'''        [Parameter(Mandatory = $true)][AllowEmptyCollection()][System.Collections.ArrayList]$List,
                  [AllowNull()]$Candidate,
                  [string]$FallbackId = '',
                  [string]$DefaultGame = ''
              )'''.replace('\n              ', '\n')
          if source.count(old_add_params) != 1:
              raise RuntimeError(f'Add-WiiLinkGroupCandidate parameter anchor count: {source.count(old_add_params)}')
          source = source.replace(old_add_params, new_add_params)

          old_array = "        foreach ($item in @($Candidate)) { Add-WiiLinkGroupCandidate -List $List -Candidate $item -FallbackId $FallbackId }"
          new_array = "        foreach ($item in @($Candidate)) { Add-WiiLinkGroupCandidate -List $List -Candidate $item -FallbackId $FallbackId -DefaultGame $DefaultGame }"
          if source.count(old_array) != 1:
              raise RuntimeError(f'Array recursion anchor count: {source.count(old_array)}')
          source = source.replace(old_array, new_array)

          old_candidate_check = r'''    if ($null -eq $Candidate.PSObject.Properties['game']) { return }
              if (-not [string]::IsNullOrWhiteSpace($FallbackId) -and $null -eq $Candidate.PSObject.Properties['id']) {'''.replace('\n              ', '\n')
          new_candidate_check = r'''    $gameProperty = $Candidate.PSObject.Properties['game']
              if ($null -eq $gameProperty) {
                  $looksLikeGroup = $false
                  foreach ($marker in @('id', 'players', 'host', 'type', 'created', 'suspend')) {
                      if ($null -ne $Candidate.PSObject.Properties[$marker]) { $looksLikeGroup = $true; break }
                  }
                  if (-not $looksLikeGroup -or [string]::IsNullOrWhiteSpace($DefaultGame)) { return }
                  try { $Candidate | Add-Member -NotePropertyName game -NotePropertyValue $DefaultGame -Force } catch { return }
              }
              if (-not [string]::IsNullOrWhiteSpace($FallbackId) -and $null -eq $Candidate.PSObject.Properties['id']) {'''.replace('\n              ', '\n')
          if source.count(old_candidate_check) != 1:
              raise RuntimeError(f'Candidate game check anchor count: {source.count(old_candidate_check)}')
          source = source.replace(old_candidate_check, new_candidate_check)

          old_convert_params = r'''        [Parameter(Mandatory = $true)][string]$Json,
                  $LogQueue = $null
              )'''.replace('\n              ', '\n')
          new_convert_params = r'''        [Parameter(Mandatory = $true)][string]$Json,
                  $LogQueue = $null,
                  [string]$DefaultGame = ''
              )'''.replace('\n              ', '\n')
          if source.count(old_convert_params) != 1:
              raise RuntimeError(f'ConvertFrom-WiiLinkGroupsJson parameter anchor count: {source.count(old_convert_params)}')
          source = source.replace(old_convert_params, new_convert_params)

          replacements = {
              "foreach ($candidate in @($container)) { Add-WiiLinkGroupCandidate -List $groups -Candidate $candidate }":
                  "foreach ($candidate in @($container)) { Add-WiiLinkGroupCandidate -List $groups -Candidate $candidate -DefaultGame $DefaultGame }",
              "Add-WiiLinkGroupCandidate -List $groups -Candidate $container":
                  "Add-WiiLinkGroupCandidate -List $groups -Candidate $container -DefaultGame $DefaultGame",
              "Add-WiiLinkGroupCandidate -List $groups -Candidate $property.Value -FallbackId ([string]$property.Name)":
                  "Add-WiiLinkGroupCandidate -List $groups -Candidate $property.Value -FallbackId ([string]$property.Name) -DefaultGame $DefaultGame",
              "[string]$Url = 'https://api.wfc.wiilink24.com/api/stats',":
                  "[string]$Url = 'https://api.wfc.wiilink24.com/api/stats?game=mprimeds',",
          }
          for old, new in replacements.items():
              count = source.count(old)
              if count != 1:
                  raise RuntimeError(f'WiiLink source replacement count for {old!r}: {count}')
              source = source.replace(old, new)

          request_anchor = "    $i = Get-MphI18n -Lang $Lang\n    $result = @{"
          request_replacement = r'''    $i = Get-MphI18n -Lang $Lang
              $statsRequestUrl = Add-WiiLinkGameQuery -Url $StatsUrl -Game $Game
              $groupsRequestUrl = Add-WiiLinkGameQuery -Url $GroupsUrl -Game $Game
              $result = @{'''.replace('\n              ', '\n')
          if source.count(request_anchor) != 1:
              raise RuntimeError(f'Request URL anchor count: {source.count(request_anchor)}')
          source = source.replace(request_anchor, request_replacement)

          source = source.replace("Get-WiiLinkPayload -Transport $Transport -Url $StatsUrl", "Get-WiiLinkPayload -Transport $Transport -Url $statsRequestUrl")
          source = source.replace("Get-WiiLinkPayload -Transport $Transport -Url $GroupsUrl", "Get-WiiLinkPayload -Transport $Transport -Url $groupsRequestUrl")
          if source.count('$statsRequestUrl') < 2 or source.count('$groupsRequestUrl') < 2:
              raise RuntimeError('Filtered request URLs were not wired into both payload calls.')

          start_log = 'Write-WiiLinkDiagnostic $LogQueue \'INFO\' \'START\' ("Update started; game={0}; transport={1}" -f $Game, $Transport)'
          start_new = 'Write-WiiLinkDiagnostic $LogQueue \'INFO\' \'START\' ("Update started; game={0}; transport={1}; filteredApi=true" -f $Game, $Transport)'
          if source.count(start_log) != 1:
              raise RuntimeError(f'START log anchor count: {source.count(start_log)}')
          source = source.replace(start_log, start_new)

          old_stats_parse = r'''        $statsProps = @($s.PSObject.Properties)
                  $statsGame = $statsProps | Where-Object { ([string]$_.Name).Trim().ToLowerInvariant() -eq $Game.Trim().ToLowerInvariant() } | Select-Object -First 1
                  if ($statsGame) {
                      $sv = $statsGame.Value
                      $result.stats = @{
                          online = [int](Get-WiiLinkPropertyValue -InputObject $sv -Name 'online' -DefaultValue 0)
                          active = [int](Get-WiiLinkPropertyValue -InputObject $sv -Name 'active' -DefaultValue 0)
                          groups = [int](Get-WiiLinkPropertyValue -InputObject $sv -Name 'groups' -DefaultValue 0)
                      }
                      Write-WiiLinkDiagnostic $LogQueue 'INFO' 'STATS' ("online={0}; active={1}; groups={2}" -f $result.stats.online, $result.stats.active, $result.stats.groups)
                  } else {
                      Write-WiiLinkDiagnostic $LogQueue 'WARN' 'STATS' ("Game key not found in stats; expected={0}; available={1}" -f $Game, (($statsProps.Name | Select-Object -First 30) -join ','))
                  }'''.replace('\n                  ', '\n')
          new_stats_parse = r'''        $statsProps = @($s.PSObject.Properties)
                  $statsGame = $statsProps | Where-Object { ([string]$_.Name).Trim().ToLowerInvariant() -eq $Game.Trim().ToLowerInvariant() } | Select-Object -First 1
                  $sv = $null
                  $statsShape = 'unknown'
                  if ($statsGame) {
                      $sv = $statsGame.Value
                      $statsShape = 'game-wrapper'
                  } elseif ($null -ne $s.PSObject.Properties['online'] -or $null -ne $s.PSObject.Properties['active'] -or $null -ne $s.PSObject.Properties['groups']) {
                      $sv = $s
                      $statsShape = 'filtered-object'
                  }
                  if ($null -ne $sv) {
                      $result.stats = @{
                          online = [int](Get-WiiLinkPropertyValue -InputObject $sv -Name 'online' -DefaultValue 0)
                          active = [int](Get-WiiLinkPropertyValue -InputObject $sv -Name 'active' -DefaultValue 0)
                          groups = [int](Get-WiiLinkPropertyValue -InputObject $sv -Name 'groups' -DefaultValue 0)
                      }
                      Write-WiiLinkDiagnostic $LogQueue 'INFO' 'STATS' ("shape={0}; online={1}; active={2}; groups={3}" -f $statsShape, $result.stats.online, $result.stats.active, $result.stats.groups)
                  } else {
                      Write-WiiLinkDiagnostic $LogQueue 'WARN' 'STATS' ("Game stats not found; expected={0}; available={1}" -f $Game, (($statsProps.Name | Select-Object -First 30) -join ','))
                  }'''.replace('\n                  ', '\n')
          if source.count(old_stats_parse) != 1:
              raise RuntimeError(f'Stats parser anchor count: {source.count(old_stats_parse)}')
          source = source.replace(old_stats_parse, new_stats_parse)

          groups_call = "ConvertFrom-WiiLinkGroupsJson -Json ([string]$groupsPayload.text) -LogQueue $LogQueue"
          groups_new = groups_call + " -DefaultGame $Game"
          if source.count(groups_call) != 1:
              raise RuntimeError(f'Groups normalization call count: {source.count(groups_call)}')
          source = source.replace(groups_call, groups_new)

          source_path.write_text(source, encoding='utf-8-sig')

          test_path = root / 'program/tests/Test-WiiLinkGameFilter.ps1'
          test_path.write_text(r'''$ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          $programDir = Split-Path -Parent (Split-Path -Parent $MyInvocation.MyCommand.Path)
          . (Join-Path $programDir 'lib\WiiLinkSource.ps1')

          function Assert-True {
              param([bool]$Condition, [string]$Message)
              if (-not $Condition) { throw "ASSERT FAILED: $Message" }
          }

          Write-Host '== Query construction =='
          Assert-True ((Add-WiiLinkGameQuery -Url 'https://api.wfc.wiilink24.com/api/stats' -Game 'mprimeds') -eq 'https://api.wfc.wiilink24.com/api/stats?game=mprimeds') 'Stats URL must receive the game query.'
          Assert-True ((Add-WiiLinkGameQuery -Url 'https://example.test/api?x=1' -Game 'mprimeds') -eq 'https://example.test/api?x=1&game=mprimeds') 'Existing query parameters must be preserved.'
          Assert-True ((Add-WiiLinkGameQuery -Url 'https://example.test/api?game=other' -Game 'mprimeds') -eq 'https://example.test/api?game=other') 'An existing game query must not be duplicated.'

          Write-Host '== Filtered response shapes =='
          $script:RequestedUrls = New-Object System.Collections.ArrayList
          function Get-WiiLinkPayload {
              param(
                  [string]$Transport,
                  [string]$Url,
                  [string]$Ua,
                  [int]$BrowserPort,
                  $LogQueue
              )
              [void]$script:RequestedUrls.Add($Url)
              if ($Url -match '/stats\?game=mprimeds$') {
                  $text = '{"online":1,"active":0,"groups":1}'
              } elseif ($Url -match '/groups\?game=mprimeds$') {
                  $text = '[{"id":"room-1","host":"0","type":"anybody","suspend":false,"created":"2026-07-23T00:00:00Z","players":{"0":{"name":"Samus","fc":"0000-0000-0000","pid":1,"conn_fail":0},"1":{"name":"Trace","fc":"1111-1111-1111","pid":2,"conn_fail":0}}}]'
              } else {
                  throw "Unexpected test URL: $Url"
              }
              return @{ text = $text; status = 200; bytes = [Text.Encoding]::UTF8.GetByteCount($text); contentType = 'application/json'; route = 'test'; proxy = ''; timeoutSec = 1 }
          }

          $result = Get-WiiLinkData -StatsUrl 'https://api.wfc.wiilink24.com/api/stats' -GroupsUrl 'https://api.wfc.wiilink24.com/api/groups' -Game 'mprimeds' -Transport direct
          Assert-True ($result.ok) ("Filtered response must parse successfully: {0}" -f $result.error)
          Assert-True ($result.stats.online -eq 1 -and $result.stats.groups -eq 1) 'Filtered top-level stats object must be accepted.'
          Assert-True (@($result.rooms).Count -eq 1) 'Filtered groups array must produce one room.'
          Assert-True (@($result.rooms[0].players).Count -eq 2) 'Filtered group without a game property must inherit the requested game.'
          Assert-True ($script:RequestedUrls.Count -eq 2) 'Exactly two filtered requests must be made.'
          Assert-True ([string]$script:RequestedUrls[0] -eq 'https://api.wfc.wiilink24.com/api/stats?game=mprimeds') 'Stats request must be game-filtered.'
          Assert-True ([string]$script:RequestedUrls[1] -eq 'https://api.wfc.wiilink24.com/api/groups?game=mprimeds') 'Groups request must be game-filtered.'

          $browserSource = Get-Content -LiteralPath (Join-Path $programDir 'lib\WiiLinkSource.ps1') -Raw
          Assert-True ($browserSource -match "api/stats\?game=mprimeds") 'Browser startup page must also be game-filtered.'
          Write-Host 'RESULT: SUCCESS'
          '''.replace('\n          ', '\n').lstrip(), encoding='utf-8-sig')

          workflow_path = root / '.github/workflows/wiilink-transport-tests.yml'
          workflow = workflow_path.read_text(encoding='utf-8')
          group_line = "          .\\program\\tests\\Test-WiiLinkGroupParsing.ps1"
          if 'Test-WiiLinkGameFilter.ps1' not in workflow:
              if workflow.count(group_line) != 1:
                  raise RuntimeError(f'Group parsing CI anchor count: {workflow.count(group_line)}')
              workflow = workflow.replace(group_line, group_line + "\n          .\\program\\tests\\Test-WiiLinkGameFilter.ps1")
          logging_line = "          .\\program\\tests\\Test-LoggingCore.ps1"
          if 'Test-DiagnosticLogIncremental.ps1' not in workflow:
              if workflow.count(logging_line) != 1:
                  raise RuntimeError(f'Logging CI anchor count: {workflow.count(logging_line)}')
              workflow = workflow.replace(logging_line, logging_line + "\n          .\\program\\tests\\Test-DiagnosticLogIncremental.ps1")
          workflow_path.write_text(workflow, encoding='utf-8')

          readme_path = root / 'README.md'
          readme = readme_path.read_text(encoding='utf-8')
          anchor = 'The browser transport is useful when local security software, TLS interception, or a network proxy blocks direct PowerShell requests.'
          addition = "\n\n**Chrome / Edge is the default WiiLink transport.** Direct API remains available as a manual option. Both WiiLink requests are filtered with `?game=mprimeds`. WiiLink only exposes a room in the room list when at least two players are present, so the online count may be nonzero even when no room row is shown."
          if '**Chrome / Edge is the default WiiLink transport.**' not in readme:
              if readme.count(anchor) != 1:
                  raise RuntimeError(f'README anchor count: {readme.count(anchor)}')
              readme = readme.replace(anchor, anchor + addition)
          elif '`?game=mprimeds`' not in readme:
              readme = readme.replace('**Chrome / Edge is the default WiiLink transport.**', '**Chrome / Edge is the default WiiLink transport.** Both WiiLink requests are filtered with `?game=mprimeds`.')
          readme_path.write_text(readme, encoding='utf-8')
          '@ | python -

          if (Test-Path -LiteralPath '.github/workflows/add-wiilink-room-note-incremental-log.yml') {
            git rm -- '.github/workflows/add-wiilink-room-note-incremental-log.yml'
          }
          git rm -- '.github/workflows/filter-wiilink-game-and-validate.yml'

      - name: Validate PowerShell syntax
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $failures = @()
          Get-ChildItem -LiteralPath .\program -Recurse -Filter '*.ps1' | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors)
            foreach ($error in @($errors)) {
              $failures += ('{0}:{1}: {2}' -f $_.FullName, $error.Extent.StartLineNumber, $error.Message)
            }
          }
          if ($failures.Count -gt 0) { throw ($failures -join [Environment]::NewLine) }

      - name: Run deterministic tests
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($test in @(
            '.\program\tests\Test-ProxyHttp.ps1',
            '.\program\tests\Test-WiiLinkBrowserFallback.ps1',
            '.\program\tests\Test-WiiLinkFallbackCapturedQueue.ps1',
            '.\program\tests\Test-WiiLinkGroupParsing.ps1',
            '.\program\tests\Test-WiiLinkGameFilter.ps1',
            '.\program\tests\Test-WiiLinkStatsOnlyDisplay.ps1',
            '.\program\tests\Test-PayloadLogging.ps1',
            '.\program\tests\Test-LoggingCore.ps1',
            '.\program\tests\Test-DiagnosticLogIncremental.ps1'
          )) {
            Write-Host "=== $test ==="
            & $test
          }

      - name: Run live transport integration test
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          $ErrorActionPreference = 'Stop'
          .\program\tests\Test-WiiLinkTransports.ps1

      - name: Commit tested changes
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- README.md program/lib/WiiLinkSource.ps1 program/tests/Test-WiiLinkGameFilter.ps1
          git add -- .github/workflows/wiilink-transport-tests.yml
          git add -u -- '.github/workflows/filter-wiilink-game-and-validate.yml'
          if (Test-Path -LiteralPath '.github/workflows/add-wiilink-room-note-incremental-log.yml') {
            git add -u -- '.github/workflows/add-wiilink-room-note-incremental-log.yml'
          }
          git commit -m 'Filter WiiLink API requests by game'
          git push origin HEAD:master
