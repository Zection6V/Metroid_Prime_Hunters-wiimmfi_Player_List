name: Publish v2026.07.23.3 release only
# GITHUB_TOKEN may create a release tag only for the current branch HEAD.

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/publish-v2026.07.23.3-release-only.yml'

permissions:
  contents: write

concurrency:
  group: publish-v2026.07.23.3-release-only
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      RELEASE_TAG: v2026.07.23.3
      RELEASE_TITLE: v2026.07.23.3 — Reliable Direct API NETDIAG
      TARGET_SHA: ${{ github.sha }}
      ASSET_NAME: Metroid_Prime_Hunters-wiimmfi_Player_List.zip

    steps:
      - name: Checkout immutable release HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Validate syntax and deterministic tests
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          $ErrorActionPreference = 'Stop'
          $failures = @()
          Get-ChildItem -LiteralPath .\program -Recurse -Filter '*.ps1' | ForEach-Object {
              $tokens = $null
              $errors = $null
              [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors)
              foreach ($error in @($errors)) {
                  $failures += ('{0}:{1}: {2}' -f $_.FullName, $error.Extent.StartLineNumber, $error.Message)
              }
          }
          if ($failures.Count -gt 0) { throw ($failures -join [Environment]::NewLine) }
          foreach ($test in @(
              '.\program\tests\Test-ProxyHttp.ps1',
              '.\program\tests\Test-WiiLinkBrowserFallback.ps1',
              '.\program\tests\Test-WiiLinkFallbackCapturedQueue.ps1',
              '.\program\tests\Test-WiiLinkGroupParsing.ps1',
              '.\program\tests\Test-WiiLinkStatsOnlyDisplay.ps1',
              '.\program\tests\Test-PayloadLogging.ps1',
              '.\program\tests\Test-LoggingCore.ps1'
          )) {
              Write-Host "=== $test ==="
              & $test
          }

      - name: Package verified ZIP
        id: package
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $assetPath = Join-Path $env:GITHUB_WORKSPACE $env:ASSET_NAME
          $verifyRoot = Join-Path $env:RUNNER_TEMP 'mph-v2026-07-23-3-release-verify'
          Remove-Item -LiteralPath $assetPath -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $verifyRoot -Recurse -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path (Join-Path $env:GITHUB_WORKSPACE 'program\*') -DestinationPath $assetPath -CompressionLevel Optimal -Force
          Expand-Archive -LiteralPath $assetPath -DestinationPath $verifyRoot -Force
          if (Test-Path -LiteralPath (Join-Path $verifyRoot 'program') -PathType Container) { throw 'program wrapper directory found.' }
          foreach ($required in @(
              'MPH-Unified.ps1',
              'Wiimmfi-PlayerList.ps1',
              'WiiLink-PlayerList.ps1',
              'Run MPH Unified.bat',
              'lib\WiiLinkFallback.ps1',
              'lib\NetworkDiagnostics.ps1',
              'tests\Test-WiiLinkBrowserFallback.ps1',
              'tests\Test-WiiLinkFallbackCapturedQueue.ps1'
          )) {
              if (-not (Test-Path -LiteralPath (Join-Path $verifyRoot $required) -PathType Leaf)) { throw "ZIP missing $required" }
          }
          $fallback = Get-Content -LiteralPath (Join-Path $verifyRoot 'lib\WiiLinkFallback.ps1') -Raw
          if ($fallback -match 'Get-WiiLinkFallbackLogQueue') { throw 'obsolete Queue discovery found.' }
          if ($fallback -notmatch 'Invoke-MphNetworkDiagnostics') { throw 'synchronous NETDIAG missing.' }
          if ($fallback -notmatch 'Running detailed Direct API diagnostics') { throw 'visible NETDIAG start record missing.' }
          $zip = Get-Item -LiteralPath $assetPath
          $sha256 = (Get-FileHash -LiteralPath $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "path=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "size=$($zip.Length)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha256=$sha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create immutable Release and Asset
        id: release
        uses: actions/github-script@v7
        env:
          ASSET_PATH: ${{ steps.package.outputs.path }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              throw new Error(`Release ${tag} already exists and will not be overwritten.`);
            } catch (error) { if (error.status !== 404) throw error; }
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              throw new Error(`Tag ${tag} already exists and will not be moved.`);
            } catch (error) { if (error.status !== 404) throw error; }

            const data = fs.readFileSync(process.env.ASSET_PATH);
            if (data.length !== Number(process.env.ASSET_SIZE)) throw new Error('ZIP size mismatch before upload.');
            const body = [
              '## 日本語', '',
              '- NETDIAGログQueueの動的スコープ探索を廃止',
              '- WiiLinkワーカーで同期Queueを捕捉し、詳細診断を同一ワーカー内で実行',
              '- DNS IPv4/IPv6、TCP 443、TLS、WinINet、WinHTTP、システムプロキシ結果をログ出力',
              '- 診断失敗もNETDIAGエラーとして表示',
              '- Chrome/Edgeへの自動フォールバックを維持', '',
              'このReleaseとAssetは上書きしません。', '',
              '## English', '',
              '- Captures the synchronized WiiLink logging Queue without dynamic-scope discovery.',
              '- Runs detailed Direct API diagnostics in the WiiLink worker.',
              '- Logs DNS IPv4/IPv6, TCP 443, TLS, WinINet, WinHTTP, and system proxy results.',
              '- Surfaces diagnostic failures as NETDIAG errors.', '',
              `Target commit: ${process.env.TARGET_SHA}`,
              `Asset SHA-256: ${process.env.ASSET_SHA256}`
            ].join('\n');
            let release;
            try {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, target_commitish: process.env.TARGET_SHA,
                name: process.env.RELEASE_TITLE, body, draft: false, prerelease: false, make_latest: 'true'
              })).data;
              const uploaded = (await github.rest.repos.uploadReleaseAsset({
                owner, repo, release_id: release.id, name: process.env.ASSET_NAME, data,
                headers: { 'content-type': 'application/zip', 'content-length': data.length }
              })).data;
              if (uploaded.name !== process.env.ASSET_NAME || uploaded.size !== data.length) throw new Error('Uploaded Asset verification failed.');
              core.setOutput('release_id', String(release.id));
              core.setOutput('release_url', release.html_url);
              core.setOutput('asset_id', String(uploaded.id));
              core.setOutput('asset_url', uploaded.browser_download_url);
            } catch (error) {
              if (release) {
                try { await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id }); } catch (_) {}
                try { await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` }); } catch (_) {}
              }
              throw error;
            }

      - name: Record verified immutable Release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          ASSET_ID: ${{ steps.release.outputs.asset_id }}
          ASSET_URL: ${{ steps.release.outputs.asset_url }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = `.github/release-status/${process.env.RELEASE_TAG}.json`;
            const status = {
              published: true,
              immutable: true,
              tag: process.env.RELEASE_TAG,
              name: process.env.RELEASE_TITLE,
              targetCommit: process.env.TARGET_SHA,
              outcomes: { validation: 'success', package: 'success', release: 'success' },
              tests: {
                powershellSyntax: 'success', proxy: 'success', browserFallback: 'success',
                capturedQueueDiagnostics: 'success', groupsParsing: 'success',
                statsOnlyDisplay: 'success', payloadLogging: 'success', loggingCore: 'success'
              },
              release: { id: Number(process.env.RELEASE_ID), url: process.env.RELEASE_URL },
              asset: {
                uploaded: true, id: Number(process.env.ASSET_ID), name: process.env.ASSET_NAME,
                size: Number(process.env.ASSET_SIZE), sha256: process.env.ASSET_SHA256,
                layout: 'program-contents-at-zip-root', downloadUrl: process.env.ASSET_URL
              },
              verifiedAt: new Date().toISOString()
            };
            let sha;
            try {
              const current = (await github.rest.repos.getContent({ owner, repo, path, ref: 'master' })).data;
              sha = current.sha;
            } catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Record immutable ${process.env.RELEASE_TAG} result`,
              content: Buffer.from(JSON.stringify(status, null, 2) + '\n').toString('base64'),
              sha, branch: 'master'
            });