name: Publish immutable program Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: New GitHub Release tag; an existing tag or Release is rejected
        required: true
      title:
        description: Release title
        required: true
      ref:
        description: Repository ref to package and release
        required: true
        default: master

permissions:
  contents: write

concurrency:
  group: publish-program-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  validate-package-publish:
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      TARGET_TAG: ${{ inputs.tag }}
      TARGET_TITLE: ${{ inputs.title }}
      TARGET_REF: ${{ inputs.ref }}
      ASSET_NAME: Metroid_Prime_Hunters-wiimmfi_Player_List.zip

    steps:
      - name: Checkout exact release source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0

      - name: Resolve immutable target commit
        id: target
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $sha = (git rev-parse HEAD).Trim()
          if ($sha -notmatch '^[0-9a-f]{40}$') { throw "Invalid target commit: $sha" }
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Release source is $sha"

      - name: Run deterministic release tests
        shell: powershell
        env:
          MPH_LANG: en
        run: |
          $ErrorActionPreference = 'Stop'
          $tests = @(
            '.\program\tests\Test-ProxyHttp.ps1',
            '.\program\tests\Test-WiiLinkBrowserFallback.ps1',
            '.\program\tests\Test-WiiLinkGroupParsing.ps1',
            '.\program\tests\Test-WiiLinkStatsOnlyDisplay.ps1',
            '.\program\tests\Test-NetworkDiagnostics.ps1',
            '.\program\tests\Test-PayloadLogging.ps1',
            '.\program\tests\Test-LoggingCore.ps1'
          )
          foreach ($test in $tests) {
            Write-Host "=== $test ==="
            & $test
            if ($LASTEXITCODE -ne 0) { throw "Test failed: $test" }
          }

      - name: Package program contents at ZIP root
        id: package
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $assetPath = Join-Path $env:GITHUB_WORKSPACE $env:ASSET_NAME
          $programRoot = Join-Path $env:GITHUB_WORKSPACE 'program'
          $verifyRoot = Join-Path $env:RUNNER_TEMP 'mph-release-verify'
          Remove-Item -LiteralPath $assetPath -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $verifyRoot -Recurse -Force -ErrorAction SilentlyContinue

          $items = @(Get-ChildItem -LiteralPath $programRoot -Force)
          if ($items.Count -eq 0) { throw 'program directory is empty.' }
          Compress-Archive -Path (Join-Path $programRoot '*') -DestinationPath $assetPath -CompressionLevel Optimal -Force
          Expand-Archive -LiteralPath $assetPath -DestinationPath $verifyRoot -Force

          if (Test-Path -LiteralPath (Join-Path $verifyRoot 'program') -PathType Container) {
            throw 'program directory must not be present at ZIP root.'
          }
          foreach ($file in @(
            'MPH-Unified.ps1',
            'Wiimmfi-PlayerList.ps1',
            'WiiLink-PlayerList.ps1',
            'Run MPH Unified.bat',
            'lib\NetworkDiagnostics.ps1',
            'lib\WiiLinkFallback.ps1',
            'tests\Test-NetworkDiagnostics.ps1'
          )) {
            if (-not (Test-Path -LiteralPath (Join-Path $verifyRoot $file) -PathType Leaf)) {
              throw "Release ZIP verification failed; missing $file"
            }
          }

          $zip = Get-Item -LiteralPath $assetPath
          $sha256 = (Get-FileHash -LiteralPath $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "path=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "size=$($zip.Length)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha256=$sha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Verified $env:ASSET_NAME size=$($zip.Length) sha256=$sha256"

      - name: Create new Release and upload immutable Asset
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
          ASSET_PATH: ${{ steps.package.outputs.path }}
          ASSET_SIZE: ${{ steps.package.outputs.size }}
          ASSET_SHA256: ${{ steps.package.outputs.sha256 }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TARGET_TAG;
            const title = process.env.TARGET_TITLE;
            const targetSha = process.env.TARGET_SHA;
            const assetName = process.env.ASSET_NAME;
            const assetPath = process.env.ASSET_PATH;
            const expectedSize = Number(process.env.ASSET_SIZE);

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              throw new Error(`Release ${tag} already exists; published releases are immutable.`);
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              throw new Error(`Tag ${tag} already exists; choose a new version.`);
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const data = fs.readFileSync(assetPath);
            if (data.length !== expectedSize) {
              throw new Error(`ZIP size changed before upload: expected=${expectedSize}, actual=${data.length}`);
            }

            let release;
            try {
              release = (await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: targetSha,
                name: title,
                body: [
                  'This Release was generated from an immutable commit.',
                  '',
                  `Target commit: ${targetSha}`,
                  `Asset SHA-256: ${process.env.ASSET_SHA256}`
                ].join('\n'),
                draft: false,
                prerelease: false,
                make_latest: 'true'
              })).data;

              const uploaded = (await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.id,
                name: assetName,
                data,
                headers: {
                  'content-type': 'application/zip',
                  'content-length': data.length
                }
              })).data;

              if (uploaded.name !== assetName || uploaded.size !== data.length) {
                throw new Error(`Uploaded Asset verification failed: name=${uploaded.name}, size=${uploaded.size}`);
              }
              core.notice(`Published immutable Release ${tag}: ${release.html_url}`);
              core.notice(`Asset: ${uploaded.browser_download_url}`);
            } catch (error) {
              if (release) {
                try { await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id }); } catch (_) {}
                try { await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` }); } catch (_) {}
              }
              throw error;
            }
